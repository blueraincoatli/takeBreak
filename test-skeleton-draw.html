<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skeleton Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #fff;
      font-family: sans-serif;
    }
    h1 { margin-bottom: 16px; font-size: 18px; color: #00ff88; }
    .canvas-container {
      width: 640px;
      height: 480px;
      background: #000;
      border-radius: 12px;
    }
    #canvas { width: 100%; height: 100%; display: block; }
    .controls { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; background: #21262d; color: #c9d1d9; }
    button.active { background: #00ff88; color: #000; }
    .info { margin-top: 12px; font-size: 13px; color: #8b949e; }
  </style>
</head>
<body>
  <h1>Skeleton Drawing Test</h1>
  <div class="canvas-container">
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <div class="controls">
    <button onclick="drawPose('standing')" class="active" id="btn-standing">Standing</button>
    <button onclick="drawPose('squatting')" id="btn-squatting">Squatting</button>
    <button onclick="drawPose('armsUp')" id="btn-armsUp">Arms Up</button>
  </div>
  <div class="info" id="info">Click buttons to switch poses</div>

  <script>
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var info = document.getElementById('info');
    var W = canvas.width;
    var H = canvas.height;

    function mx(x) { return W - x * W; }
    function my(y) { return y * H; }

    var POSES = {
      standing: [
        {x:0.5,    y:0.12, vis:0.99},
        {x:0.485,  y:0.105,vis:0.99},
        {x:0.478,  y:0.105,vis:0.99},
        {x:0.468,  y:0.108,vis:0.99},
        {x:0.515,  y:0.105,vis:0.99},
        {x:0.522,  y:0.105,vis:0.99},
        {x:0.532,  y:0.108,vis:0.99},
        {x:0.455,  y:0.115,vis:0.90},
        {x:0.545,  y:0.115,vis:0.90},
        {x:0.487,  y:0.135,vis:0.95},
        {x:0.513,  y:0.135,vis:0.95},
        {x:0.42,   y:0.28, vis:0.99},
        {x:0.58,   y:0.28, vis:0.99},
        {x:0.40,   y:0.42, vis:0.99},
        {x:0.60,   y:0.42, vis:0.99},
        {x:0.38,   y:0.55, vis:0.99},
        {x:0.62,   y:0.55, vis:0.99},
        {x:0.37,   y:0.56, vis:0.80},
        {x:0.63,   y:0.56, vis:0.80},
        {x:0.37,   y:0.55, vis:0.80},
        {x:0.63,   y:0.55, vis:0.80},
        {x:0.38,   y:0.54, vis:0.80},
        {x:0.62,   y:0.54, vis:0.80},
        {x:0.46,   y:0.52, vis:0.99},
        {x:0.54,   y:0.52, vis:0.99},
        {x:0.45,   y:0.72, vis:0.99},
        {x:0.55,   y:0.72, vis:0.99},
        {x:0.44,   y:0.92, vis:0.99},
        {x:0.56,   y:0.92, vis:0.99},
        {x:0.43,   y:0.94, vis:0.90},
        {x:0.57,   y:0.94, vis:0.90},
        {x:0.42,   y:0.93, vis:0.90},
        {x:0.58,   y:0.93, vis:0.90}
      ],
      squatting: [
        {x:0.5,    y:0.38, vis:0.99},
        {x:0.485,  y:0.365,vis:0.99},
        {x:0.478,  y:0.365,vis:0.99},
        {x:0.468,  y:0.368,vis:0.99},
        {x:0.515,  y:0.365,vis:0.99},
        {x:0.522,  y:0.365,vis:0.99},
        {x:0.532,  y:0.368,vis:0.99},
        {x:0.455,  y:0.375,vis:0.90},
        {x:0.545,  y:0.375,vis:0.90},
        {x:0.487,  y:0.395,vis:0.95},
        {x:0.513,  y:0.395,vis:0.95},
        {x:0.36,   y:0.42, vis:0.99},
        {x:0.64,   y:0.42, vis:0.99},
        {x:0.30,   y:0.50, vis:0.99},
        {x:0.70,   y:0.50, vis:0.99},
        {x:0.28,   y:0.58, vis:0.99},
        {x:0.72,   y:0.58, vis:0.99},
        {x:0.27,   y:0.59, vis:0.80},
        {x:0.73,   y:0.59, vis:0.80},
        {x:0.27,   y:0.58, vis:0.80},
        {x:0.73,   y:0.58, vis:0.80},
        {x:0.28,   y:0.57, vis:0.80},
        {x:0.72,   y:0.57, vis:0.80},
        {x:0.40,   y:0.58, vis:0.99},
        {x:0.60,   y:0.58, vis:0.99},
        {x:0.34,   y:0.74, vis:0.99},
        {x:0.66,   y:0.74, vis:0.99},
        {x:0.44,   y:0.92, vis:0.99},
        {x:0.56,   y:0.92, vis:0.99},
        {x:0.43,   y:0.94, vis:0.90},
        {x:0.57,   y:0.94, vis:0.90},
        {x:0.42,   y:0.93, vis:0.90},
        {x:0.58,   y:0.93, vis:0.90}
      ]
    };

    // Arms Up = standing with raised arms
    POSES.armsUp = JSON.parse(JSON.stringify(POSES.standing));
    POSES.armsUp[13] = {x:0.36, y:0.18, vis:0.99};
    POSES.armsUp[14] = {x:0.64, y:0.18, vis:0.99};
    POSES.armsUp[15] = {x:0.32, y:0.06, vis:0.99};
    POSES.armsUp[16] = {x:0.68, y:0.06, vis:0.99};

    function getPt(lm, i) {
      return lm[i] && lm[i].vis > 0.3 ? lm[i] : null;
    }

    function drawConnections(lm) {
      var conns = [
        [11,12],[11,23],[12,24],[23,24],
        [11,13],[13,15],[15,17],[15,19],[15,21],
        [12,14],[14,16],[16,18],[16,20],[16,22],
        [23,25],[25,27],[27,29],[27,31],[29,31],
        [24,26],[26,28],[28,30],[28,32],[30,32]
      ];
      for (var c = 0; c < conns.length; c++) {
        var a = conns[c][0], b = conns[c][1];
        var pa = getPt(lm, a), pb = getPt(lm, b);
        if (!pa || !pb) continue;
        ctx.beginPath();
        ctx.moveTo(mx(pa.x), my(pa.y));
        ctx.lineTo(mx(pb.x), my(pb.y));
        ctx.strokeStyle = 'rgba(0,255,136,0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function drawHead(lm) {
      var nose = getPt(lm, 0);
      var leye = getPt(lm, 2) || getPt(lm, 1);
      var lear = getPt(lm, 7);
      if (!nose || !leye) return;

      var noseX = mx(nose.x);
      var noseY = my(nose.y);

      // Face width from ear-to-nose distance
      var faceW;
      if (lear) {
        faceW = Math.abs(noseX - mx(lear.x)) * 1.6;
      } else {
        faceW = Math.abs(my(leye.y) - noseY) * 4;
      }
      faceW = Math.max(faceW, 40);

      var headH = faceW * 1.15;
      var cx = noseX;
      var cy = noseY - headH * 0.1;
      var rx = faceW / 2;
      var ry = headH / 2;

      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,255,136,0.2)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,255,136,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw mouth
      var lmo = getPt(lm, 9), rmo = getPt(lm, 10);
      if (lmo && rmo) {
        ctx.beginPath();
        ctx.moveTo(mx(lmo.x), my(lmo.y));
        ctx.lineTo(mx(rmo.x), my(rmo.y));
        ctx.strokeStyle = 'rgba(0,255,136,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    function drawBody(lm) {
      var ls = getPt(lm, 11), rs = getPt(lm, 12);
      var lh = getPt(lm, 23), rh = getPt(lm, 24);
      if (!ls || !rs || !lh || !rh) return;

      var sw = Math.abs(mx(rs.x) - mx(ls.x));

      // Torso (trapezoid)
      ctx.beginPath();
      ctx.moveTo(mx(ls.x) - sw*0.12, my(ls.y));
      ctx.lineTo(mx(rs.x) + sw*0.12, my(rs.y));
      ctx.lineTo(mx(rh.x) + sw*0.06, my(rh.y));
      ctx.lineTo(mx(lh.x) - sw*0.06, my(lh.y));
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,255,136,0.2)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,255,136,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Arms
      function drawArm(si, ei, wi, dir) {
        var s = getPt(lm, si), e = getPt(lm, ei), w = getPt(lm, wi);
        if (!s || !e) return;
        var aw = sw * 0.11, ww = aw * 0.55;
        ctx.beginPath();
        ctx.moveTo(mx(s.x) - dir*aw, my(s.y));
        ctx.lineTo(mx(s.x) + dir*aw, my(s.y));
        ctx.lineTo(mx(e.x) + dir*aw*0.8, my(e.y));
        ctx.lineTo(mx(e.x) - dir*aw*0.8, my(e.y));
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,255,136,0.12)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,136,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        if (w) {
          ctx.beginPath();
          ctx.moveTo(mx(e.x) - dir*aw*0.8, my(e.y));
          ctx.lineTo(mx(e.x) + dir*aw*0.8, my(e.y));
          ctx.lineTo(mx(w.x) + dir*ww, my(w.y));
          ctx.lineTo(mx(w.x) - dir*ww, my(w.y));
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
      }
      drawArm(11, 13, 15, -1);
      drawArm(12, 14, 16,  1);

      // Legs
      function drawLeg(hi, ki, ai, dir) {
        var hp = getPt(lm, hi), kp = getPt(lm, ki), ap = getPt(lm, ai);
        if (!hp || !kp) return;
        var lw = sw * 0.13, aw = lw * 0.5;
        ctx.beginPath();
        ctx.moveTo(mx(hp.x) - dir*lw, my(hp.y));
        ctx.lineTo(mx(hp.x) + dir*lw, my(hp.y));
        ctx.lineTo(mx(kp.x) + dir*lw*0.8, my(kp.y));
        ctx.lineTo(mx(kp.x) - dir*lw*0.8, my(kp.y));
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,255,136,0.12)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,136,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        if (ap) {
          ctx.beginPath();
          ctx.moveTo(mx(kp.x) - dir*lw*0.8, my(kp.y));
          ctx.lineTo(mx(kp.x) + dir*lw*0.8, my(kp.y));
          ctx.lineTo(mx(ap.x) + dir*aw, my(ap.y));
          ctx.lineTo(mx(ap.x) - dir*aw, my(ap.y));
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
      }
      drawLeg(23, 25, 27, -1);
      drawLeg(24, 26, 28,  1);
    }

    function drawPose(type) {
      var btns = document.querySelectorAll('button');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      var btn = document.getElementById('btn-' + type);
      if (btn) btn.classList.add('active');

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      var lm = POSES[type] || POSES.standing;
      drawBody(lm);
      drawHead(lm);
      drawConnections(lm);

      var count = 0;
      for (var j = 0; j < lm.length; j++) if (lm[j] && lm[j].vis > 0.3) count++;
      info.textContent = 'Pose: ' + type + ' | ' + count + ' landmarks';
    }

    drawPose('standing');
  </script>
</body>
</html>
