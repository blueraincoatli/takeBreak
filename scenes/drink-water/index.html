<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喝水提醒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #canvas-outline {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 20;
            pointer-events: none;
        }
        #video { display: none; }
        
        /* 顶部 UI */
        .ui-top {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            pointer-events: none;
        }
        .title {
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 12px;
            color: rgba(150,220,255,0.4);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .status {
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 300;
            color: rgba(180,230,255,0.85);
            text-shadow: 0 0 20px rgba(100,200,255,0.3);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .water-bar {
            width: 160px;
            height: 6px;
            background: rgba(50,100,150,0.25);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(100,180,255,0.2);
        }
        .water-fill {
            height: 100%;
            background: linear-gradient(90deg, #2a6a9a, #4ab0d0, #70d0f0);
            border-radius: 3px;
            transition: width 0.6s ease;
            width: 0%;
        }
        .progress-text {
            margin-top: 6px;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 11px;
            color: rgba(150,220,255,0.5);
        }
        
        /* 底部提示 */
        .hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            pointer-events: none;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 11px;
            color: rgba(150,220,255,0.35);
            letter-spacing: 2px;
        }
        
        /* 完成遮罩 */
        .done-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,5,15,0.7);
        }
        .done-overlay.show { opacity: 1; pointer-events: all; }
        .done-card {
            background: rgba(10,30,60,0.9);
            border: 1px solid rgba(100,180,255,0.35);
            border-radius: 14px;
            padding: 32px 45px;
            text-align: center;
            transform: scale(0.85);
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .done-overlay.show .done-card { transform: scale(1); }
        .done-icon { font-size: 40px; margin-bottom: 10px; }
        .done-title {
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 24px;
            color: rgba(150,220,255,0.9);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .done-sub {
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 11px;
            color: rgba(150,220,255,0.45);
        }
        
        /* 加载 */
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 999;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(100,180,255,0.2);
            border-top-color: rgba(100,180,255,0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-t {
            font-family: 'Microsoft YaHei', sans-serif;
            color: rgba(150,220,255,0.45);
            font-size: 11px;
            letter-spacing: 2px;
        }
        
        /* 调试 */
        .debug {
            position: fixed;
            bottom: 12px; right: 12px;
            background: rgba(0,10,30,0.6);
            color: rgba(100,180,255,0.5);
            font-family: 'Consolas', monospace;
            font-size: 9px;
            line-height: 1.4;
            padding: 6px 8px;
            border-radius: 4px;
            z-index: 500;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <canvas id="canvas-outline"></canvas>
    <video id="video" autoplay playsinline muted></video>
    
    <div class="ui-top">
        <div class="title">补水提醒</div>
        <div class="status" id="status">去倒杯水吧</div>
        <div class="water-bar"><div class="water-fill" id="waterFill"></div></div>
        <div class="progress-text" id="progressText">0%</div>
    </div>
    
    <div class="hint" id="hintText">点击任意处跳过</div>
    
    <div class="done-overlay" id="doneOverlay">
        <div class="done-card">
            <div class="done-icon">💧</div>
            <div class="done-title">补水完成</div>
            <div class="done-sub">身体已补充水分</div>
        </div>
    </div>
    
    <div class="debug" id="debug">...</div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-t" id="loadText">加载中...</div>
    </div>

    <script>
    // ============================================================
    // WebGL Metaball Water Person
    // ============================================================
    
    const canvas = document.getElementById('glCanvas');
    const outlineCanvas = document.getElementById('canvas-outline');
    const outlineCtx = outlineCanvas.getContext('2d');
    const video = document.getElementById('video');
    
    function resizeOutline() {
        outlineCanvas.width = window.innerWidth;
        outlineCanvas.height = window.innerHeight;
    }
    resizeOutline();
    
    // State
    let state = 0; // 0:等待离开  1:等待回来  2:等待喝水  3:完成
    let leaveTime = 0;
    let lastDrinkTime = 0;
    let drinkCount = 0;
    let waterLevel = 0;
    let targetWaterLevel = 0;
    let frameCount = 0;
    let poseData = null;
    let headBaseY = null;  // baseline nose.y when head is level
    
    // Config
    const DRINK_TARGET = 2;
    const LEAVE_THRESHOLD = 0.65;
    const RETURN_THRESHOLD = 0.45;
    const DRINK_DIST = 0.30;
    const HAND_FACE_DIST = 0.22;   // hand-to-face distance threshold (generous)
    const HEAD_TILT_UP = 0.012;    // how much nose must rise above baseline
    const LEAVE_TIME_MIN = 2500;
    const DRINK_COOLDOWN = 1200;
    
    // DOM
    const statusEl = document.getElementById('status');
    const waterFillEl = document.getElementById('waterFill');
    const progressTextEl = document.getElementById('progressText');
    const doneOverlay = document.getElementById('doneOverlay');
    const loadingEl = document.getElementById('loading');
    const loadTextEl = document.getElementById('loadText');
    const debugEl = document.getElementById('debug');
    
    // ============================================================
    // WebGL Setup
    // ============================================================
    let gl, program;
    let timeUniform, resolutionUniform, waterLevelUniform;
    let ballsUniformLoc; // uniform vec4 u_balls[46]
    
    // 46 balls: xy=position (0-1 screen space), z=0, w=radius
    // Upper body only. Arms have 14 balls each with large radii for smooth tubes.
    const BALL_COUNT = 46;
    const BALL_DEFAULTS = new Float32Array([
        // Head (5 balls)
        0.5, 0.83, 0, 0.060,    // 0:  head top
        0.46, 0.79, 0, 0.055,   // 1:  head left
        0.5, 0.79, 0, 0.065,    // 2:  head center
        0.54, 0.79, 0, 0.055,   // 3:  head right
        0.5, 0.75, 0, 0.055,    // 4:  jaw
        // Neck
        0.5, 0.71, 0, 0.050,    // 5:  neck
        // Torso (6 balls)
        0.5, 0.67, 0, 0.080,    // 6:  upper chest bridge
        0.5, 0.62, 0, 0.130,    // 7:  chest
        0.5, 0.55, 0, 0.120,    // 8:  mid torso
        0.5, 0.48, 0, 0.100,    // 9:  abdomen
        0.5, 0.41, 0, 0.085,    // 10: lower abdomen
        0.5, 0.36, 0, 0.070,    // 11: hip center
        // Collarbones
        0.45, 0.67, 0, 0.060,   // 12: l_collar
        0.55, 0.67, 0, 0.060,   // 13: r_collar
        // Left arm (14 balls - very dense for smooth tube)
        0.40, 0.68, 0, 0.065,   // 14: l_shoulder
        0.38, 0.64, 0, 0.062,   // 15: l_upper 1/6
        0.36, 0.60, 0, 0.060,   // 16: l_upper 2/6
        0.34, 0.56, 0, 0.058,   // 17: l_upper 3/6
        0.32, 0.52, 0, 0.056,   // 18: l_upper 4/6
        0.30, 0.48, 0, 0.055,   // 19: l_upper 5/6
        0.28, 0.44, 0, 0.053,   // 20: l_elbow area
        0.26, 0.40, 0, 0.050,   // 21: l_forearm 1/4
        0.25, 0.36, 0, 0.048,   // 22: l_forearm 2/4
        0.24, 0.32, 0, 0.046,   // 23: l_forearm 3/4
        0.23, 0.28, 0, 0.044,   // 24: l_wrist area
        0.22, 0.25, 0, 0.042,   // 25: l_hand near
        0.22, 0.22, 0, 0.040,   // 26: l_hand mid
        0.21, 0.19, 0, 0.038,   // 27: l_hand tip
        // Right arm (14 balls, mirror)
        0.60, 0.68, 0, 0.065,   // 28: r_shoulder
        0.62, 0.64, 0, 0.062,   // 29: r_upper 1/6
        0.64, 0.60, 0, 0.060,   // 30: r_upper 2/6
        0.66, 0.56, 0, 0.058,   // 31: r_upper 3/6
        0.68, 0.52, 0, 0.056,   // 32: r_upper 4/6
        0.70, 0.48, 0, 0.055,   // 33: r_upper 5/6
        0.72, 0.44, 0, 0.053,   // 34: r_elbow area
        0.74, 0.40, 0, 0.050,   // 35: r_forearm 1/4
        0.75, 0.36, 0, 0.048,   // 36: r_forearm 2/4
        0.76, 0.32, 0, 0.046,   // 37: r_forearm 3/4
        0.77, 0.28, 0, 0.044,   // 38: r_wrist area
        0.78, 0.25, 0, 0.042,   // 39: r_hand near
        0.78, 0.22, 0, 0.040,   // 40: r_hand mid
        0.79, 0.19, 0, 0.038,   // 41: r_hand tip
        // Armpit connectors
        0.43, 0.62, 0, 0.060,   // 42: l_armpit
        0.57, 0.62, 0, 0.060,   // 43: r_armpit
        // Back shoulder
        0.42, 0.58, 0, 0.050,   // 44: l_back
        0.58, 0.58, 0, 0.050    // 45: r_back
    ]);
    let ballData = new Float32Array(BALL_DEFAULTS);
    
    const vertexShaderSource = `
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    `;
    
    const fragmentShaderSource = `
        precision highp float;

        uniform float u_time;
        uniform vec2 u_resolution;
        uniform float u_waterLevel;

        // 38 balls: xy=position (0-1 screen space), z=unused, w=radius
        uniform vec4 u_balls[46];

        #define BALL_COUNT 46
        #define THRESHOLD 1.0

        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }

        float noise2D(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }

        // Fractal brownian motion for richer texture
        float fbm(vec2 p) {
            float v = 0.0;
            float a = 0.5;
            for (int i = 0; i < 4; i++) {
                v += a * noise2D(p);
                p *= 2.0;
                a *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution;
            float aspect = u_resolution.x / u_resolution.y;
            float t = u_time;

            // ---- Compute 2D metaball field ----
            float field = 0.0;
            // Also track weighted center for internal effects
            float totalWeight = 0.0;
            vec2 weightedCenter = vec2(0.0);

            for (int i = 0; i < BALL_COUNT; i++) {
                vec4 ball = u_balls[i];
                vec2 ballPos = ball.xy;

                // Wobble: each ball has unique frequency and amplitude
                float fi = float(i);
                float wobFreq1 = 0.4 + hash(vec2(fi, 1.0)) * 0.5;
                float wobFreq2 = 0.3 + hash(vec2(fi, 2.0)) * 0.4;
                float wobAmpX = 0.004 + hash(vec2(fi, 3.0)) * 0.008;
                float wobAmpY = 0.003 + hash(vec2(fi, 4.0)) * 0.006;
                ballPos += vec2(
                    sin(t * wobFreq1 + fi * 2.1 + hash(vec2(fi, 5.0)) * 6.28) * wobAmpX,
                    cos(t * wobFreq2 + fi * 1.7 + hash(vec2(fi, 6.0)) * 6.28) * wobAmpY
                );

                // Breathing: randomized per ball
                float breathFreq = 0.6 + hash(vec2(fi, 7.0)) * 0.6;
                float breathAmp = 0.03 + hash(vec2(fi, 8.0)) * 0.05;
                float breath = 1.0 + sin(t * breathFreq + fi * 0.5) * breathAmp;
                float r = ball.w * breath;

                vec2 diff = uv - ballPos;
                diff.x *= aspect;
                float d2 = dot(diff, diff);
                float contribution = r * r / max(d2, 0.00001);
                field += contribution;

                // Track center for depth effect
                if (contribution > 0.01) {
                    weightedCenter += ballPos * contribution;
                    totalWeight += contribution;
                }
            }

            // ---- Background ----
            // Light blue gradient instead of dark
            vec3 bgColor = mix(
                vec3(0.55, 0.75, 0.88),
                vec3(0.82, 0.92, 0.97),
                uv.y
            );
            // Very subtle caustic near body
            float bgCaustic = noise2D(uv * 25.0 + vec2(t * 0.2, t * 0.15)) * 0.02;
            bgColor += vec3(0.02, 0.04, 0.06) * bgCaustic * smoothstep(0.2, 0.8, field);

            vec3 col = bgColor;

            // ---- Smooth edge transition ----
            float edgeFade = smoothstep(THRESHOLD - 0.3, THRESHOLD + 0.3, field);

            if (field > THRESHOLD * 0.3) {
                // Compute gradient (normal) for shading
                float eps = 0.002;
                float fieldR = 0.0, fieldU = 0.0;
                for (int i = 0; i < BALL_COUNT; i++) {
                    vec4 ball = u_balls[i];
                    vec2 bp = ball.xy;
                    float fi = float(i);
                    bp += vec2(
                        sin(t * (0.4 + hash(vec2(fi,1.0))*0.5) + fi*2.1) * (0.004 + hash(vec2(fi,3.0))*0.008),
                        cos(t * (0.3 + hash(vec2(fi,2.0))*0.4) + fi*1.7) * (0.003 + hash(vec2(fi,4.0))*0.006)
                    );
                    float br = 1.0 + sin(t * (0.6 + hash(vec2(fi,7.0))*0.6) + fi*0.5) * (0.03 + hash(vec2(fi,8.0))*0.05);
                    float r = ball.w * br;

                    vec2 dR = (uv + vec2(eps, 0.0)) - bp; dR.x *= aspect;
                    fieldR += r * r / max(dot(dR, dR), 0.00001);
                    vec2 dU = (uv + vec2(0.0, eps)) - bp; dU.x *= aspect;
                    fieldU += r * r / max(dot(dU, dU), 0.00001);
                }
                vec2 grad = vec2(fieldR - field, fieldU - field) / eps;
                float gradLen = length(grad);
                vec2 normal2D = gradLen > 0.001 ? -grad / gradLen : vec2(0.0, 1.0);

                // "Fresnel" - stronger at edges where gradient is shallow
                float fresnel = 1.0 - smoothstep(0.0, 80.0, gradLen);
                fresnel = pow(fresnel, 0.6);

                // Depth: higher field value = deeper inside body = more opaque
                float depth = smoothstep(THRESHOLD, THRESHOLD * 3.0, field);

                // === Water colors with depth ===
                vec3 deepColor    = vec3(0.15, 0.40, 0.58);  // lightened
                vec3 midColor     = vec3(0.22, 0.52, 0.70);  // lightened
                vec3 surfaceColor = vec3(0.35, 0.65, 0.82);
                vec3 edgeColor    = vec3(0.55, 0.82, 0.95);

                vec3 waterColor = mix(edgeColor, midColor, depth);
                waterColor = mix(waterColor, deepColor, depth * depth * 0.2);

                // Height-based tint
                waterColor = mix(waterColor, surfaceColor, smoothstep(0.3, 0.8, uv.y) * 0.3);

                // Water level fill effect
                float waterFill = u_waterLevel;
                float waterLine = 1.0 - waterFill * 0.6;
                float inWater = smoothstep(waterLine + 0.03, waterLine - 0.03, uv.y);
                waterColor = mix(waterColor, deepColor * 1.5, inWater * 0.35);

                // === Lighting ===
                vec2 lightDir1 = normalize(vec2(0.4, 0.8));
                vec2 lightDir2 = normalize(vec2(-0.5, 0.3));

                // Diffuse
                float diff1 = max(dot(normal2D, lightDir1), 0.0);
                float diff2 = max(dot(normal2D, lightDir2), 0.0);
                waterColor += vec3(0.15, 0.30, 0.45) * diff1 * 0.4;
                waterColor += vec3(0.05, 0.10, 0.15) * diff2 * 0.2;

                // Specular highlights (sharp water-like)
                vec2 halfV1 = normalize(lightDir1 + vec2(0.0, 1.0));
                float spec1 = pow(max(dot(normal2D, halfV1), 0.0), 48.0);
                waterColor += vec3(0.8, 0.92, 1.0) * spec1 * 0.6;

                vec2 halfV2 = normalize(lightDir2 + vec2(0.0, 1.0));
                float spec2 = pow(max(dot(normal2D, halfV2), 0.0), 24.0);
                waterColor += vec3(0.3, 0.5, 0.7) * spec2 * 0.3;

                // === Fresnel edge: translucent water look ===
                vec3 fresnelColor = vec3(0.5, 0.85, 1.0);
                waterColor = mix(waterColor, fresnelColor, fresnel * 0.65);

                // === Edge rim glow ===
                float edgeDist = field - THRESHOLD;
                float rimGlow = exp(-edgeDist * 3.0) * 0.4;
                waterColor += vec3(0.3, 0.65, 0.95) * rimGlow;

                // === Surface water effects ===
                // Flowing caustic pattern
                float caustic = fbm(uv * 15.0 + vec2(t * 0.4, t * 0.3) + normal2D * 0.5);
                waterColor += vec3(0.08, 0.15, 0.20) * caustic * depth;

                // Bubble noise (small bright spots)
                float bubble = noise2D(uv * 60.0 + vec2(t * 0.8, t * 0.6));
                bubble = smoothstep(0.75, 0.85, bubble);
                waterColor += vec3(0.3, 0.5, 0.6) * bubble * 0.3 * depth;

                // Surface ripple highlight
                float ripple = noise2D(uv * 40.0 + vec2(t * 0.5, -t * 0.3) + normal2D * 2.0);
                waterColor += vec3(0.05, 0.12, 0.18) * ripple;

                // Slight transparency at very edges
                float alpha = mix(0.7, 1.0, depth);

                col = mix(bgColor, waterColor, edgeFade * alpha);

                // ---- Outline: sharp edge line ----
                float edgeSharp = smoothstep(THRESHOLD - 0.15, THRESHOLD + 0.15, field);
                float outline = smoothstep(0.0, 0.3, edgeSharp) - smoothstep(0.3, 0.7, edgeSharp);
                vec3 outlineColor = vec3(0.3, 0.6, 0.85);
                col = mix(col, outlineColor, outline * 0.7);
            }

            // ---- Outer glow (very subtle) ----
            float glow = smoothstep(THRESHOLD * 0.2, THRESHOLD * 0.7, field);
            col += vec3(0.05, 0.15, 0.25) * glow * 0.15 * (1.0 - edgeFade);

            // Vignette (light for bright background)
            float vig = 1.0 - smoothstep(0.7, 1.6, length((uv - 0.5) * vec2(aspect, 1.0)));
            col = mix(col, col * 0.9, 1.0 - vig);

            // Gamma
            col = pow(col, vec3(0.85));

            gl_FragColor = vec4(col, 1.0);
        }
    `;
    
    function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader error:', gl.getShaderInfoLog(shader));
            return null;
        }
        return shader;
    }
    
    function createProgram(gl, vs, fs) {
        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
            console.error('Program error:', gl.getProgramInfoLog(prog));
            return null;
        }
        return prog;
    }
    
    function initGL() {
        gl = canvas.getContext('webgl');
        if (!gl) {
            loadTextEl.textContent = 'WebGL not supported';
            return false;
        }

        const vs = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fs = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
        if (!vs || !fs) {
            dbg(['Shader compile failed']);
            return false;
        }
        program = createProgram(gl, vs, fs);

        if (!program) {
            dbg(['Program link failed']);
            return false;
        }
        
        gl.useProgram(program);
        
        // Create quad
        const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const posAttr = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(posAttr);
        gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);
        
        // Get uniform locations
        timeUniform = gl.getUniformLocation(program, 'u_time');
        resolutionUniform = gl.getUniformLocation(program, 'u_resolution');
        waterLevelUniform = gl.getUniformLocation(program, 'u_waterLevel');
        ballsUniformLoc = gl.getUniformLocation(program, 'u_balls[0]');
        if (!ballsUniformLoc) {
            console.error('Failed to get u_balls uniform location');
            dbg(['ERROR: u_balls uniform not found']);
        }
        
        return true;
    }
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
    }
    
    // ============================================================
    // MediaPipe (simplified - for pose detection)
    // ============================================================
    let poseLandmarker = null;
    
    async function initMediaPipe() {
        try {
            dbg(['加载 MediaPipe 模块...']);
            const { FilesetResolver, PoseLandmarker } = await import(
                'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js'
            );
            
            loadTextEl.textContent = '加载 WASM...';
            dbg(['加载 WASM...']);
            const vision = await FilesetResolver.forVisionTasks(
                'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
            );
            
            loadTextEl.textContent = '加载姿态模型...';
            dbg(['创建 PoseLandmarker...']);
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: '/models/pose_landmarker_lite.task', delegate: 'CPU' },
                runningMode: 'VIDEO', numPoses: 1,
                minPoseDetectionConfidence: 0.5, minPosePresenceConfidence: 0.5, minTrackingConfidence: 0.5
            });
            
            dbg(['PoseLandmarker 创建成功']);
            loadTextEl.textContent = '摄像头...';
            return true;
        } catch(e) {
            console.error('[MediaPipe]', e);
            loadTextEl.textContent = 'MediaPipe 失败: ' + e.message;
            dbg(['MediaPipe err: ' + e.message]);
            return false;
        }
    }
    
    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
        });
        video.srcObject = stream;
        await video.play();
    }
    
    // ============================================================
    // Process Pose
    // ============================================================
    function dist3D(a, b) {
        const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0);
        return Math.sqrt(dx*dx + dy*dy + dz*dz);
    }
    
    function dbg(lines) {
        if (!Array.isArray(lines)) {
            lines = [String(lines)];
        }
        if (debugEl) {
            debugEl.textContent = lines.join('\n');
        }
    }
    
    // ============================================================
    // Draw Pose Outline (skeleton overlay, subtle reference)
    // ============================================================
    function drawPoseOutline(lm) {
        if (!lm || lm.length < 25) return;
        // No overlay needed - metaball IS the body visualization now
    }
    
    function processPose(poseLm, faceLm) {
        if (state >= 3) return;
        
        poseData = poseLm;
        
        const hasPose = poseLm && poseLm.length > 0;
        const nose = hasPose ? poseLm[0] : null;
        const validPose = nose && nose.x > 0 && nose.x < 1 && nose.y > 0 && nose.y < 1;
        
        // State 0: 等待离开
        if (state === 0) {
            statusEl.textContent = '去倒杯水吧';
            if (!validPose || nose.y > LEAVE_THRESHOLD) {
                statusEl.textContent = '等你回来';
                state = 1;
                leaveTime = Date.now();
                dbg(['离开']);
            }
            return;
        }
        
        // State 1: 等待回来
        if (state === 1) {
            statusEl.textContent = '等你回来';
            if (Date.now() - leaveTime < LEAVE_TIME_MIN) return;
            
            if (validPose && nose.y < RETURN_THRESHOLD) {
                statusEl.textContent = '请喝水';
                state = 2;
                dbg(['回来']);
            }
            return;
        }
        
        // State 2: 等待喝水
        // Detection: hand near face + head tilted upward
        if (state === 2) {
            if (!validPose) return;

            const nose = poseLm[0];
            const lWrist = poseLm[15];
            const rWrist = poseLm[16];
            const lShoulder = poseLm[11];
            const rShoulder = poseLm[12];

            // Head baseline: nose-to-shoulder-midpoint relative Y
            // Using relative position makes it robust to body movement
            const shoulderMidY = (lShoulder.y + rShoulder.y) / 2;
            const relativeNoseY = nose.y - shoulderMidY;  // negative (nose above shoulders)

            // Init baseline on first frame
            if (headBaseY === null) headBaseY = relativeNoseY;

            // Hand-to-face distance first (to decide if we should freeze baseline)
            let handNearFace = false;
            let minDist = 999;
            const facePt = { x: nose.x, y: nose.y, z: nose.z || 0 };
            [lWrist, rWrist].forEach(w => {
                if (w) {
                    const d = dist3D(w, facePt);
                    if (d < minDist) minDist = d;
                    if (d < HAND_FACE_DIST) handNearFace = true;
                }
            });

            // Only update baseline when hand is NOT near face (avoid chasing tilt)
            if (!handNearFace) {
                headBaseY = headBaseY * 0.92 + relativeNoseY * 0.08;
            }

            // Head tilt: relativeNoseY is negative, gets MORE negative when head tilts up
            const headTilt = headBaseY - relativeNoseY;  // positive when head tilts up
            const isHeadUp = headTilt > HEAD_TILT_UP;

            // Both conditions: hand near face AND head tilted up
            const drinking = handNearFace && isHeadUp;

            if (frameCount % 15 === 0) {
                dbg([
                    'tilt=' + headTilt.toFixed(3) + (isHeadUp ? ' UP' : ''),
                    'hDist=' + minDist.toFixed(3) + (handNearFace ? ' NEAR' : ''),
                    'drink=' + drinkCount + '/' + DRINK_TARGET
                ]);
            }
            
            if (drinking && Date.now() - lastDrinkTime > DRINK_COOLDOWN) {
                drinkCount++;
                lastDrinkTime = Date.now();
                targetWaterLevel = Math.min(drinkCount / DRINK_TARGET, 1);
                playDrinkSound();
                
                if (drinkCount >= DRINK_TARGET) {
                    statusEl.textContent = '完成！';
                    state = 3;
                    targetWaterLevel = 1;
                    onComplete();
                }
            }
        }
    }
    
    async function onComplete() {
        playDoneSound();
        doneOverlay.classList.add('show');
        setTimeout(async () => {
            try { await fetch('http://localhost:3721/api/scene-complete', { method: 'POST' }); } catch(_) {}
            setTimeout(() => window.close(), 2000);
        }, 2500);
    }
    
    // ============================================================
    // Sound
    // ============================================================
    function playDrinkSound() {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(180, ac.currentTime + 0.12);
            gain.gain.setValueAtTime(0.1, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(ac.destination);
            osc.start();
            osc.stop(ac.currentTime + 0.18);
        } catch(_) {}
    }
    
    function playDoneSound() {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            [400, 500, 600, 800].forEach((f, i) => {
                const o = ac.createOscillator(), g = ac.createGain();
                o.type = 'sine';
                o.frequency.value = f;
                g.gain.setValueAtTime(0.08, ac.currentTime + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.1 + 0.2);
                o.connect(g);
                g.connect(ac.destination);
                o.start(ac.currentTime + i * 0.1);
                o.stop(ac.currentTime + i * 0.1 + 0.3);
            });
        } catch(_) {}
    }
    
    // ============================================================
    // Render Loop
    // ============================================================
    let startTime = null;
    let prevPose = null;

    // Per-ball random jitter (computed once, stable)
    const ballJitter = [];
    for (let i = 0; i < 46; i++) {
        const s = Math.sin(i * 127.1 + 311.7) * 43758.5453;
        const r1 = (s - Math.floor(s)) * 2 - 1;  // -1 to 1
        const s2 = Math.sin(i * 269.5 + 183.3) * 43758.5453;
        const r2 = (s2 - Math.floor(s2)) * 2 - 1;
        const s3 = Math.sin(i * 419.2 + 71.9) * 43758.5453;
        const r3 = (s3 - Math.floor(s3));          // 0 to 1, radius scale
        ballJitter.push({ dx: r1, dy: r2, rs: 0.85 + r3 * 0.3 }); // radius scale 0.85-1.15
    }
    
    function smoothPt(cur, prev, a = 0.5) {
        if (!prev) return cur;
        return {
            x: a * cur.x + (1 - a) * prev.x,
            y: a * cur.y + (1 - a) * prev.y,
            z: a * (cur.z || 0) + (1 - a) * (prev.z || 0)
        };
    }
    
    function render(time) {
        if (startTime === null) startTime = time;
        const t = (time - startTime) * 0.001;
        
        // Water level animation
        waterLevel += (targetWaterLevel - waterLevel) * 0.03;
        
        // Update UI
        waterFillEl.style.width = (waterLevel * 100) + '%';
        progressTextEl.textContent = Math.round(waterLevel * 100) + '%';
        
        // Update ball positions from pose data
        // ballData layout: 46 balls * 4 floats (x, y, z, radius)
        if (poseData && poseData.length >= 25) {
            const mapX = (mpX) => 1.0 - mpX;
            const mapY = (mpY) => 1.0 - mpY;

            const setBall = (idx, pt, r) => {
                const off = idx * 4;
                const j = ballJitter[idx];
                const jx = j.dx * 0.003;
                const jy = j.dy * 0.003;
                ballData[off]     = mapX(pt.x) + jx;
                ballData[off + 1] = mapY(pt.y) + jy;
                ballData[off + 2] = 0;
                ballData[off + 3] = r * j.rs;
            };

            const lerp = (a, b, t) => ({ x: a.x+(b.x-a.x)*t, y: a.y+(b.y-a.y)*t, z: (a.z||0)+((b.z||0)-(a.z||0))*t });
            const mid  = (a, b) => lerp(a, b, 0.5);

            // --- Landmarks ---
            const nose      = poseData[0];
            const lEar      = poseData[7] || nose;
            const rEar      = poseData[8] || nose;
            const lShoulder = poseData[11];
            const rShoulder = poseData[12];
            const lElbow    = poseData[13];
            const rElbow    = poseData[14];
            const lWrist    = poseData[15];
            const rWrist    = poseData[16];
            const lHip      = poseData[23];
            const rHip      = poseData[24];

            // --- Derived anchors ---
            const neckPt    = mid(lShoulder, rShoulder);
            const hipCX     = mid(lHip, rHip);
            const chestPt   = lerp(neckPt, hipCX, 0.15);
            const upperTorso= lerp(neckPt, hipCX, 0.28);
            const midTorso  = lerp(neckPt, hipCX, 0.42);
            const abdomenPt = lerp(neckPt, hipCX, 0.58);
            const lowerAb   = lerp(neckPt, hipCX, 0.75);
            // Head
            const headL     = lerp(nose, lEar, 0.6);
            const headR     = lerp(nose, rEar, 0.6);
            const headTop   = lerp(nose, neckPt, -0.55);
            const jaw       = lerp(nose, neckPt, 0.45);
            // Left arm: 14 interpolation points
            // shoulder->elbow: 6 evenly spaced
            // elbow->wrist: 4 evenly spaced
            // wrist->hand: 3 points extending past wrist
            const lU1 = lerp(lShoulder, lElbow, 1/6);
            const lU2 = lerp(lShoulder, lElbow, 2/6);
            const lU3 = lerp(lShoulder, lElbow, 3/6);
            const lU4 = lerp(lShoulder, lElbow, 4/6);
            const lU5 = lerp(lShoulder, lElbow, 5/6);
            const lF1 = lWrist ? lerp(lElbow, lWrist, 0.2) : lElbow;
            const lF2 = lWrist ? lerp(lElbow, lWrist, 0.4) : lElbow;
            const lF3 = lWrist ? lerp(lElbow, lWrist, 0.6) : lElbow;
            const lF4 = lWrist ? lerp(lElbow, lWrist, 0.8) : lElbow;
            const lH1 = lWrist ? lerp(lElbow, lWrist, 1.0) : lElbow;
            const lH2 = lWrist ? lerp(lElbow, lWrist, 1.15) : lElbow;
            const lH3 = lWrist ? lerp(lElbow, lWrist, 1.30) : lElbow;
            // Right arm (mirror)
            const rU1 = lerp(rShoulder, rElbow, 1/6);
            const rU2 = lerp(rShoulder, rElbow, 2/6);
            const rU3 = lerp(rShoulder, rElbow, 3/6);
            const rU4 = lerp(rShoulder, rElbow, 4/6);
            const rU5 = lerp(rShoulder, rElbow, 5/6);
            const rF1 = rWrist ? lerp(rElbow, rWrist, 0.2) : rElbow;
            const rF2 = rWrist ? lerp(rElbow, rWrist, 0.4) : rElbow;
            const rF3 = rWrist ? lerp(rElbow, rWrist, 0.6) : rElbow;
            const rF4 = rWrist ? lerp(rElbow, rWrist, 0.8) : rElbow;
            const rH1 = rWrist ? lerp(rElbow, rWrist, 1.0) : rElbow;
            const rH2 = rWrist ? lerp(rElbow, rWrist, 1.15) : rElbow;
            const rH3 = rWrist ? lerp(rElbow, rWrist, 1.30) : rElbow;
            // Connectors
            const lCollar = lerp(neckPt, lShoulder, 0.5);
            const rCollar = lerp(neckPt, rShoulder, 0.5);
            const lArmpit = lerp(lShoulder, midTorso, 0.5);
            const rArmpit = lerp(rShoulder, midTorso, 0.5);
            const lBack   = lerp(lShoulder, upperTorso, 0.6);
            const rBack   = lerp(rShoulder, upperTorso, 0.6);

            // --- Head (5) ---
            setBall(0, headTop,  0.060);
            setBall(1, headL,    0.055);
            setBall(2, nose,     0.065);
            setBall(3, headR,    0.055);
            setBall(4, jaw,      0.055);

            // --- Neck ---
            setBall(5, neckPt, 0.050);

            // --- Torso (6) ---
            setBall(6,  chestPt,    0.080);
            setBall(7,  upperTorso, 0.130);
            setBall(8,  midTorso,   0.120);
            setBall(9,  abdomenPt,  0.100);
            setBall(10, lowerAb,    0.085);
            setBall(11, hipCX,      0.070);

            // --- Collarbones ---
            setBall(12, lCollar, 0.060);
            setBall(13, rCollar, 0.060);

            // --- Left arm (14 balls) ---
            setBall(14, lShoulder, 0.065);
            setBall(15, lU1,       0.062);
            setBall(16, lU2,       0.060);
            setBall(17, lU3,       0.058);
            setBall(18, lU4,       0.056);
            setBall(19, lU5,       0.055);
            setBall(20, lElbow,    0.053);
            setBall(21, lF1,       0.052);
            setBall(22, lF2,       0.050);
            setBall(23, lF3,       0.048);
            setBall(24, lF4,       0.046);
            setBall(25, lH1,       0.044);
            setBall(26, lH2,       0.042);
            setBall(27, lH3,       0.038);

            // --- Right arm (14 balls) ---
            setBall(28, rShoulder, 0.065);
            setBall(29, rU1,       0.062);
            setBall(30, rU2,       0.060);
            setBall(31, rU3,       0.058);
            setBall(32, rU4,       0.056);
            setBall(33, rU5,       0.055);
            setBall(34, rElbow,    0.053);
            setBall(35, rF1,       0.052);
            setBall(36, rF2,       0.050);
            setBall(37, rF3,       0.048);
            setBall(38, rF4,       0.046);
            setBall(39, rH1,       0.044);
            setBall(40, rH2,       0.042);
            setBall(41, rH3,       0.038);

            // --- Armpit connectors ---
            setBall(42, lArmpit, 0.060);
            setBall(43, rArmpit, 0.060);

            // --- Back shoulder ---
            setBall(44, lBack, 0.050);
            setBall(45, rBack, 0.050);

            if (frameCount % 30 === 0) {
                dbg([
                    'head: ' + ballData[8].toFixed(3) + ',' + ballData[9].toFixed(3),
                    'uLoc=' + (ballsUniformLoc ? 'ok' : 'NULL')
                ]);
            }
        } else {
            if (frameCount % 60 === 0) {
                dbg(['No pose data', 'poseData=' + (poseData ? poseData.length : 'null')]);
            }
        }

        // Render
        gl.uniform1f(timeUniform, t);
        gl.uniform2f(resolutionUniform, canvas.width, canvas.height);
        gl.uniform1f(waterLevelUniform, waterLevel);

        // Pass all 46 balls as one uniform4fv call
        if (ballsUniformLoc) {
            gl.uniform4fv(ballsUniformLoc, ballData);
        }
        
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
        // MediaPipe detection
        if (poseLandmarker && video.videoWidth && state < 3) {
            frameCount++;
            try {
                const results = poseLandmarker.detectForVideo(video, performance.now());
                const poseLm = results?.landmarks?.[0];
                
                let smoothPose = null;
                if (poseLm) {
                    smoothPose = poseLm.map((pt, i) => smoothPt(pt, prevPose ? prevPose[i] : null, 0.5));
                    prevPose = smoothPose;
                } else {
                    prevPose = null;
                }
                
                processPose(smoothPose, null);
                
                // Draw pose outline on canvas-outline
                outlineCtx.clearRect(0, 0, outlineCanvas.width, outlineCanvas.height);
                if (smoothPose) {
                    drawPoseOutline(smoothPose);
                }
            } catch(e) {
                if (frameCount % 60 === 0) dbg(['detect err: ' + e.message]);
            }
        } else {
            // Log why detection is not running
            if (frameCount % 60 === 0) {
                const reasons = [];
                if (!poseLandmarker) reasons.push('no landmarkder');
                if (!video.videoWidth) reasons.push('no video');
                if (state >= 3) reasons.push('done');
                dbg(['No detection: ' + reasons.join(', ')]);
            }
        }
        
        requestAnimationFrame(render);
    }
    
    // ============================================================
    // Init
    // ============================================================
    (async () => {
        try {
            dbg(['开始初始化...']);
            
            if (!initGL()) {
                dbg(['initGL 失败']);
                return;
            }
            dbg(['WebGL 初始化成功']);
            
            resize();
            window.addEventListener('resize', resize);
            
            dbg(['开始加载 MediaPipe...']);
            const mpOk = await initMediaPipe();
            if (!mpOk) {
                dbg(['MediaPipe 初始化失败，请查看加载界面']);
                return;
            }
            dbg(['MediaPipe 初始化成功']);
            
            await startCamera();
            dbg(['摄像头启动成功']);
            
            loadingEl.classList.add('hidden');
            setTimeout(() => loadingEl.remove(), 400);
            
            dbg(['开始渲染']);
            requestAnimationFrame(render);
        } catch(err) {
            loadTextEl.textContent = '启动失败: ' + err.message;
            dbg(['启动异常: ' + err.message]);
        }
    })();
    
    // Click skip
    document.addEventListener('click', () => {
        if (state >= 3) return;
        state = 3;
        targetWaterLevel = 1;
        playDoneSound();
        doneOverlay.classList.add('show');
        setTimeout(async () => {
            try { await fetch('http://localhost:3721/api/scene-complete', { method: 'POST' }); } catch(_) {}
            setTimeout(() => window.close(), 1500);
        }, 1800);
    });
    </script>
