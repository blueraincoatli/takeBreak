<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喝水提醒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .bg-screenshot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000 no-repeat center center;
            background-size: 100vw 100vh;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 10000;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
            background: linear-gradient(135deg, 
                rgba(135, 206, 235, 0.95) 0%, 
                rgba(176, 224, 230, 0.95) 50%,
                rgba(173, 216, 230, 0.95) 100%);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 水滴装饰 */
        .water-drop {
            position: fixed;
            font-size: 30px;
            opacity: 0;
            animation: dropFall 3s ease-in infinite;
            z-index: 1;
        }

        @keyframes dropFall {
            0% {
                opacity: 0;
                transform: translateY(-50px) rotate(0deg);
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* 主容器 */
        .main-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        /* 大水杯图标 */
        .water-glass {
            font-size: clamp(100px, 20vw, 180px);
            margin-bottom: 20px;
            animation: glassShake 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(0, 100, 200, 0.3));
        }

        @keyframes glassShake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* 主标题 - 表情包风格 */
        .main-title {
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 900;
            color: #0066CC;
            text-shadow: 
                3px 3px 0 #fff,
                -2px -2px 0 #87CEEB,
                0 0 30px rgba(0, 150, 255, 0.5);
            margin-bottom: 15px;
            animation: textPulse 1.5s ease-in-out infinite;
            letter-spacing: 4px;
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 副标题 */
        .sub-title {
            font-size: clamp(18px, 4vw, 28px);
            color: #004080;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
        }

        /* 健康提示框 */
        .health-tips {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px 30px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0, 100, 200, 0.2);
            border: 3px solid #87CEEB;
            opacity: 0;
            animation: slideUp 0.8s ease 0.5s forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tip-title {
            font-size: 20px;
            color: #0066CC;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tip-text {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }

        /* 进度条 - 水分 */
        .hydration-bar {
            width: 300px;
            height: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #87CEEB;
        }

        .hydration-fill {
            height: 100%;
            background: linear-gradient(90deg, #87CEEB, #0066CC);
            width: 30%;
            border-radius: 10px;
            animation: hydrationPulse 2s ease-in-out infinite;
        }

        @keyframes hydrationPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .hydration-label {
            font-size: 14px;
            color: #0066CC;
            margin-top: 5px;
        }

        /* 关闭提示 */
        .close-hint {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(0, 80, 160, 0.7);
            opacity: 0;
            animation: fadeInHint 1s ease 1s forwards;
        }

        @keyframes fadeInHint {
            to { opacity: 1; }
        }

        /* 表情包风格的强调文字 */
        .emphasis-text {
            display: inline-block;
            background: #FF6B6B;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            animation: emphasisPulse 1s ease-in-out infinite;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        @keyframes emphasisPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="bg-screenshot"></div>

    <!-- 水滴装饰 -->
    <div class="water-drop" style="left: 10%; animation-delay: 0s;">💧</div>
    <div class="water-drop" style="left: 25%; animation-delay: 0.5s;">💧</div>
    <div class="water-drop" style="left: 40%; animation-delay: 1s;">💧</div>
    <div class="water-drop" style="left: 60%; animation-delay: 1.5s;">💧</div>
    <div class="water-drop" style="left: 75%; animation-delay: 0.3s;">💧</div>
    <div class="water-drop" style="left: 90%; animation-delay: 0.8s;">💧</div>

    <div class="overlay" id="overlay">
        <div class="main-container">
            <div class="water-glass">🥤</div>
            
            <div class="main-title" id="mainTitle">该喝水了！</div>
            <div class="sub-title" id="subTitle">你的身体正在发出缺水警报</div>

            <!-- 水分进度条 -->
            <div class="hydration-bar">
                <div class="hydration-fill"></div>
            </div>
            <div class="hydration-label">当前水分：30% - 急需补水！</div>

            <div class="health-tips">
                <div class="tip-title">💡 健康小知识</div>
                <div class="tip-text" id="tipText">
                    连续工作1小时不喝水，身体水分会下降5%<br>
                    缺水会导致：头晕、疲劳、注意力下降
                </div>
                <div class="emphasis-text">现在就喝一口！</div>
            </div>
        </div>

        <div class="close-hint">点击任意位置关闭，记得去倒水哦~</div>
    </div>

    <script>
        const mainTitles = [
            "该喝水了！",
            "喝水时间到！",
            "你的肾在求救！",
            "缺水警报！",
            "吨吨吨时间！",
            "身体渴了！"
        ];

        const subTitles = [
            "你的身体正在发出缺水警报",
            "再不喝就变成人干了",
            "喝水防脱发，真的",
            "你的细胞在喊渴",
            "老板可以等，身体不能等",
            "喝水是最便宜的保健品"
        ];

        const tips = [
            "连续工作1小时不喝水，身体水分会下降5%<br>缺水会导致：头晕、疲劳、注意力下降",
            "成年人每天需要喝1500-2000ml水<br>你现在喝了多少？",
            "缺水会影响大脑功能<br>喝口水，灵感就来了",
            "皮肤不好？多喝水！<br>比护肤品管用多了",
            "喝水能预防肾结石<br>你的肾会感谢你的",
            "感到累了？可能是缺水<br>不是缺咖啡"
        ];

        document.getElementById('mainTitle').textContent = 
            mainTitles[Math.floor(Math.random() * mainTitles.length)];
        document.getElementById('subTitle').textContent = 
            subTitles[Math.floor(Math.random() * subTitles.length)];
        document.getElementById('tipText').innerHTML = 
            tips[Math.floor(Math.random() * tips.length)];

        // 播放水滴声
        function playWaterSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;

                // 水滴声
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);

                filter.type = 'lowpass';
                filter.frequency.value = 1000;

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(now);
                osc.stop(now + 0.15);

                // 第二滴
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(600, now + 0.3);
                    osc2.frequency.exponentialRampToValueAtTime(300, now + 0.4);
                    gain2.gain.setValueAtTime(0.2, now + 0.3);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start(now + 0.3);
                    osc2.stop(now + 0.45);
                }, 300);
            } catch (e) {}
        }

        playWaterSound();

        // 点击关闭
        document.getElementById('overlay').addEventListener('click', () => {
            const overlay = document.getElementById('overlay');
            overlay.style.transition = 'opacity 0.3s';
            overlay.style.opacity = '0';
            setTimeout(() => window.close(), 300);
        });
    </script>
</body>
</html>
