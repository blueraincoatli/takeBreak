<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫咪霸屏警告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .bg-screenshot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000 no-repeat center center;
            background-size: 100vw 100vh;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 10000;
        }

        /* Shadow under the cat to make it look 3D */
        .cat-shadow {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: 8vh;
            background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
            z-index: 10001;
            opacity: 0;
            animation: shadowAppear 1s ease-out 0.5s forwards;
        }

        @keyframes shadowAppear {
            to { opacity: 1; }
        }

        /* Cat video container */
        .cat-container {
            position: fixed;
            bottom: -5%;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100vw;
            z-index: 10002;
            animation: catSlideIn 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        }

        .cat-container img {
            width: 100%;
            display: block;
            object-fit: contain;
        }

        @keyframes catSlideIn {
            0% {
                transform: translateX(-50%) translateY(100%);
            }
            100% {
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Paw prints appearing one by one */
        .paw-prints {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10003;
        }

        .paw {
            position: absolute;
            font-size: 40px;
            opacity: 0;
            animation: pawAppear 0.5s ease forwards;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        @keyframes pawAppear {
            0% { opacity: 0; transform: scale(0) rotate(-20deg); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { opacity: 0.7; transform: scale(1) rotate(0deg); }
        }

        /* Reminder text */
        .reminder-text {
            position: fixed;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(20px, 3.5vw, 42px);
            font-weight: bold;
            color: #fff;
            text-shadow:
                0 0 15px rgba(255, 150, 50, 0.8),
                0 0 30px rgba(255, 100, 0, 0.5),
                2px 2px 0 rgba(0,0,0,0.5);
            text-align: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            backdrop-filter: blur(4px);
            opacity: 0;
            z-index: 10004;
            white-space: pre-line;
            letter-spacing: 2px;
            animation: textFloat 0.8s ease-out 2s forwards;
        }

        @keyframes textFloat {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Close hint */
        .close-hint {
            position: fixed;
            bottom: 2%;
            right: 3%;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            z-index: 10005;
            opacity: 0;
            animation: hintAppear 0.5s ease 3s forwards;
        }

        @keyframes hintAppear {
            to { opacity: 1; }
        }

        /* Meow speech bubble */
        .meow-bubble {
            position: fixed;
            top: 15%;
            right: 10%;
            background: #fff;
            color: #333;
            font-size: clamp(18px, 2.5vw, 28px);
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            opacity: 0;
            z-index: 10004;
            animation: bubblePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 2.5s forwards;
        }

        .meow-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 30px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 12px solid #fff;
        }

        @keyframes bubblePop {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="bg-screenshot"></div>

    <div class="overlay" id="overlay">
        <div class="paw-prints" id="pawPrints"></div>

        <div class="cat-shadow"></div>

        <div class="cat-container" id="catContainer">
            <img id="catImg" src="cat_00221_.webp" alt="cat" draggable="false">
        </div>

        <div class="reminder-text" id="reminderText"></div>
        <div class="meow-bubble" id="meowBubble">喵~ 别工作了！</div>
        <div class="close-hint">click anywhere to dismiss</div>
    </div>

    <script>
        const messages = [
            "猫猫说：\n该休息了，让我躺一会",
            "你的猫已经接管了屏幕\n请起来活动一下",
            "猫咪挡住了你的工作！\n不如去撸猫吧",
            "本喵命令你：\n站起来！伸个懒腰！",
            "工作？什么工作？\n猫猫才是正经事",
            "猫猫监工已上线\n检测到你久坐，强制休息"
        ];

        const meows = [
            "喵~ 别工作了！",
            "喵呜...陪我玩~",
            "呼噜噜...好困...",
            "喵！起来！",
            "~ 伸个懒腰吧 ~",
            "miaow~ break time!"
        ];

        document.getElementById('reminderText').textContent =
            messages[Math.floor(Math.random() * messages.length)];
        document.getElementById('meowBubble').textContent =
            meows[Math.floor(Math.random() * meows.length)];

        // Create paw prints
        function createPawPrints() {
            const container = document.getElementById('pawPrints');
            const positions = [
                { top: '20%', left: '8%', delay: 0.2, rotate: -15 },
                { top: '30%', left: '15%', delay: 0.4, rotate: 10 },
                { top: '15%', left: '22%', delay: 0.6, rotate: -5 },
                { top: '35%', left: '75%', delay: 0.8, rotate: 20 },
                { top: '25%', left: '82%', delay: 1.0, rotate: -10 },
                { top: '18%', left: '88%', delay: 1.2, rotate: 15 },
            ];
            positions.forEach(p => {
                const paw = document.createElement('div');
                paw.className = 'paw';
                paw.style.top = p.top;
                paw.style.left = p.left;
                paw.style.animationDelay = p.delay + 's';
                paw.style.transform = `rotate(${p.rotate}deg)`;
                // Simple text-based paw print (no emoji in code, using CSS)
                paw.innerHTML = '<svg width="40" height="40" viewBox="0 0 40 40"><ellipse cx="20" cy="28" rx="10" ry="8" fill="rgba(255,180,120,0.6)"/><circle cx="12" cy="16" r="4" fill="rgba(255,180,120,0.6)"/><circle cx="20" cy="12" r="4" fill="rgba(255,180,120,0.6)"/><circle cx="28" cy="16" r="4" fill="rgba(255,180,120,0.6)"/></svg>';
                container.appendChild(paw);
            });
        }

        // Play a meow sound
        function playMeow() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'sine';
                // Cat meow: rising then falling pitch
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.15);
                osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.4);

                filter.type = 'bandpass';
                filter.frequency.value = 600;
                filter.Q.value = 2;

                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {}
        }

        createPawPrints();
        setTimeout(playMeow, 2000);

        // Phase 1: play full animation once (217 frames x 42ms = ~9.1s)
        // Phase 2: switch to cat_sleep.webp (last 24 frames, loops as sleeping)
        const FULL_ANIM_DURATION = 217 * 42; // ~9114ms
        const catImg = document.getElementById('catImg');
        setTimeout(() => {
            catImg.src = 'cat_sleep.webp';
        }, FULL_ANIM_DURATION);

        // Click to close
        document.getElementById('overlay').addEventListener('click', () => {
            const overlay = document.getElementById('overlay');
            overlay.style.transition = 'opacity 0.5s';
            overlay.style.opacity = '0';
            setTimeout(() => window.close(), 500);
        });
    </script>
</body>
</html>
