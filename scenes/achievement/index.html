<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就解锁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .bg-screenshot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000 no-repeat center center;
            background-size: 100vw 100vh;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 10000;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 成就弹窗 */
        .achievement-popup {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #D4AF37;
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.8),
                0 0 40px rgba(212, 175, 55, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transform: scale(0) rotate(-10deg);
            animation: popupBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.3s forwards;
            position: relative;
            max-width: 500px;
            width: 80%;
        }

        @keyframes popupBounce {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.1) rotate(3deg);
            }
            80% {
                transform: scale(0.95) rotate(-1deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* 闪光效果 */
        .sparkle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0;
            animation: sparkleAnim 1s ease-out forwards;
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.5) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(360deg);
            }
        }

        /* 成就图标 */
        .achievement-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            animation: iconGlow 2s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
            }
        }

        .trophy {
            font-size: 80px;
            line-height: 100px;
        }

        /* 标题 */
        .achievement-title {
            font-size: 14px;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInUp 0.5s ease 0.8s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 成就名称 */
        .achievement-name {
            font-size: clamp(24px, 5vw, 36px);
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            opacity: 0;
            animation: fadeInUp 0.5s ease 1s forwards;
        }

        /* 成就描述 */
        .achievement-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 0.5s ease 1.2s forwards;
        }

        /* 奖励区域 */
        .reward-section {
            background: rgba(212, 175, 55, 0.1);
            border: 2px dashed #D4AF37;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeInUp 0.5s ease 1.5s forwards;
        }

        .reward-label {
            font-size: 12px;
            color: #D4AF37;
            margin-bottom: 5px;
        }

        .reward-text {
            font-size: 18px;
            color: #FFD700;
            font-weight: bold;
        }

        /* 关闭提示 */
        .close-hint {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: fadeIn 0.5s ease 2s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 粒子效果 */
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
        }
    </style>
</head>
<body>
    <div class="bg-screenshot"></div>

    <div class="overlay" id="overlay">
        <div class="achievement-popup" id="popup">
            <!-- 闪光装饰 -->
            <div class="sparkle" style="top: -10px; left: 20%; animation-delay: 0.5s;"></div>
            <div class="sparkle" style="top: 10%; right: -10px; animation-delay: 0.7s;"></div>
            <div class="sparkle" style="bottom: 20%; left: -10px; animation-delay: 0.9s;"></div>
            <div class="sparkle" style="bottom: -10px; right: 30%; animation-delay: 1.1s;"></div>

            <!-- 成就图标 -->
            <div class="achievement-icon">
                <div class="trophy">🏆</div>
            </div>

            <!-- 标题 -->
            <div class="achievement-title">成就解锁</div>

            <!-- 成就名称 -->
            <div class="achievement-name" id="achievementName">久坐大师</div>

            <!-- 成就描述 -->
            <div class="achievement-desc" id="achievementDesc">
                连续坐满 60 分钟，展现了惊人的毅力（和腰椎压力）
            </div>

            <!-- 奖励 -->
            <div class="reward-section">
                <div class="reward-label">🎁 奖励</div>
                <div class="reward-text" id="rewardText">健康的身体！请站起来领取</div>
            </div>
        </div>

        <div class="close-hint">点击任意位置关闭</div>
    </div>

    <script>
        const achievements = [
            { name: "久坐大师", desc: "连续坐满 60 分钟，展现了惊人的毅力（和腰椎压力）" },
            { name: "椅子粘连者", desc: "你的屁股已经和椅子融为一体，分不开了" },
            { name: "屁股生根", desc: "检测到你在椅子上扎根，建议立即拔起" },
            { name: "马拉松坐者", desc: "坐姿耐力超越 99% 的用户（这不值得骄傲）" },
            { name: "一小时俱乐部", desc: "成功坐满一小时，入会礼物：腰痛" }
        ];

        const rewards = [
            "健康的身体！请站起来领取 🎁",
            "起来走动 5 分钟解锁更多成就",
            "真实奖励：你的身体会感谢你",
            "隐藏奖励：预防腰椎间盘突出",
            "特别奖励：清醒的大脑和灵活的身体"
        ];

        const ach = achievements[Math.floor(Math.random() * achievements.length)];
        document.getElementById('achievementName').textContent = ach.name;
        document.getElementById('achievementDesc').textContent = ach.desc;
        document.getElementById('rewardText').textContent = 
            rewards[Math.floor(Math.random() * rewards.length)];

        // 创建粒子效果
        function createParticles() {
            const colors = ['#FFD700', '#FFA500', '#FF6347', '#87CEEB'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + 'vw';
                    particle.style.top = Math.random() * 100 + 'vh';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.animation = `particleFly 1s ease-out forwards`;
                    
                    const style = document.createElement('style');
                    style.textContent = `
                        @keyframes particleFly {
                            0% {
                                transform: translate(0, 0) scale(1);
                                opacity: 1;
                            }
                            100% {
                                transform: translate(${(Math.random()-0.5)*200}px, ${(Math.random()-0.5)*200}px) scale(0);
                                opacity: 0;
                            }
                        }
                    `;
                    document.head.appendChild(style);
                    document.body.appendChild(particle);
                    
                    setTimeout(() => particle.remove(), 1000);
                }, 500 + i * 50);
            }
        }

        // 播放成就解锁音效
        function playAchievementSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;

                // 上升的荣耀音效
                const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                
                freqs.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    gain.gain.setValueAtTime(0, now + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.2, now + i * 0.1 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.5);
                });
            } catch (e) {}
        }

        setTimeout(createParticles, 300);
        setTimeout(playAchievementSound, 500);

        // 点击关闭
        document.getElementById('overlay').addEventListener('click', () => {
            const overlay = document.getElementById('overlay');
            overlay.style.transition = 'opacity 0.3s';
            overlay.style.opacity = '0';
            setTimeout(() => window.close(), 300);
        });
    </script>
</body>
</html>
