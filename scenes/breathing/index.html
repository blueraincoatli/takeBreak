<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼吸引导</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .bg-screenshot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000 no-repeat center center;
            background-size: 100vw 100vh;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 10000;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            background: linear-gradient(180deg, 
                rgba(135, 206, 235, 0.9) 0%, 
                rgba(176, 224, 230, 0.95) 50%,
                rgba(173, 216, 230, 0.9) 100%);
            transition: background 4s ease;
        }

        .overlay.inhale {
            background: linear-gradient(180deg, 
                rgba(135, 206, 235, 0.95) 0%, 
                rgba(200, 230, 255, 0.98) 50%,
                rgba(176, 224, 230, 0.95) 100%);
        }

        .overlay.hold {
            background: linear-gradient(180deg, 
                rgba(135, 206, 235, 0.95) 0%, 
                rgba(176, 224, 230, 0.98) 50%,
                rgba(173, 216, 230, 0.95) 100%);
        }

        .overlay.exhale {
            background: linear-gradient(180deg, 
                rgba(100, 149, 237, 0.9) 0%, 
                rgba(135, 206, 235, 0.95) 50%,
                rgba(70, 130, 180, 0.9) 100%);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 呼吸圆圈容器 */
        .breath-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 呼吸圆圈 */
        .breath-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(135, 206, 235, 0.8) 40%,
                rgba(70, 130, 180, 0.6) 100%);
            box-shadow: 
                0 0 60px 20px rgba(135, 206, 235, 0.4),
                0 0 100px 40px rgba(135, 206, 235, 0.2),
                inset 0 0 40px rgba(255, 255, 255, 0.5);
            transform: scale(0.6);
            transition: transform 4s ease-in-out, box-shadow 4s ease-in-out;
        }

        .breath-circle.inhale {
            transform: scale(1.3);
            box-shadow: 
                0 0 80px 30px rgba(135, 206, 235, 0.6),
                0 0 120px 50px rgba(135, 206, 235, 0.3),
                inset 0 0 60px rgba(255, 255, 255, 0.7);
        }

        .breath-circle.hold {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.3); }
            50% { transform: scale(1.32); }
        }

        .breath-circle.exhale {
            transform: scale(0.6);
            box-shadow: 
                0 0 40px 10px rgba(70, 130, 180, 0.3),
                0 0 60px 20px rgba(70, 130, 180, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* 呼吸文字 */
        .breath-text {
            position: fixed;
            top: 70%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 300;
            color: #2c5f7c;
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeInText 1s ease 0.5s forwards;
            text-shadow: 0 2px 10px rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        .breath-text .sub {
            font-size: 0.5em;
            color: #5a8aa8;
            margin-top: 10px;
            display: block;
        }

        /* 周期计数 */
        .cycle-count {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #5a8aa8;
            z-index: 10;
            opacity: 0;
            animation: fadeInText 1s ease 1s forwards;
        }

        /* 完成提示 */
        .complete-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(24px, 5vw, 36px);
            color: #2c5f7c;
            text-align: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .complete-message.show {
            animation: showComplete 0.8s ease forwards;
        }

        @keyframes showComplete {
            to { opacity: 1; }
        }

        /* 关闭提示 */
        .close-hint {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(44, 95, 124, 0.6);
            z-index: 10;
            opacity: 0;
            animation: fadeInText 1s ease 2s forwards;
        }

        /* 装饰圆环 */
        .ring {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(135, 206, 235, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }

        .ring:nth-child(1) {
            width: 280px;
            height: 280px;
            animation: ringExpand 4s ease-in-out infinite;
        }

        .ring:nth-child(2) {
            width: 360px;
            height: 360px;
            animation: ringExpand 4s ease-in-out infinite 0.5s;
        }

        @keyframes ringExpand {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.1;
            }
        }
    </style>
</head>
<body>
    <div class="bg-screenshot"></div>

    <div class="overlay" id="overlay">
        <!-- 装饰圆环 -->
        <div class="ring"></div>
        <div class="ring"></div>

        <!-- 周期计数 -->
        <div class="cycle-count" id="cycleCount">呼吸周期：0 / 2</div>

        <!-- 呼吸圆圈 -->
        <div class="breath-container">
            <div class="breath-circle" id="breathCircle"></div>
        </div>

        <!-- 呼吸文字 -->
        <div class="breath-text" id="breathText">
            准备开始
            <span class="sub">跟随圆圈呼吸</span>
        </div>

        <!-- 完成提示 -->
        <div class="complete-message" id="completeMessage">
            <div>🧘 呼吸完成</div>
            <div style="font-size: 0.6em; margin-top: 15px; color: #5a8aa8;">
                现在站起来活动一下吧
            </div>
        </div>

        <div class="close-hint">点击任意位置关闭</div>
    </div>

    <script>
        const breathCircle = document.getElementById('breathCircle');
        const breathText = document.getElementById('breathText');
        const overlay = document.getElementById('overlay');
        const cycleCount = document.getElementById('cycleCount');
        const completeMessage = document.getElementById('completeMessage');

        let currentCycle = 0;
        const totalCycles = 2;
        let isComplete = false;

        const texts = {
            inhale: { main: '吸气...', sub: '慢慢吸气，感受腹部扩张' },
            hold: { main: '屏息...', sub: '保持片刻' },
            exhale: { main: '呼气...', sub: '慢慢呼气，放松身体' }
        };

        function updateText(phase) {
            breathText.innerHTML = `${texts[phase].main}<span class="sub">${texts[phase].sub}</span>`;
        }

        function playBreathSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                
                if (type === 'inhale') {
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(400, now + 4);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.05, now + 4);
                } else if (type === 'exhale') {
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.linearRampToValueAtTime(300, now + 4);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0.1, now + 4);
                }

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 4);
            } catch (e) {}
        }

        function breatheCycle() {
            if (currentCycle >= totalCycles) {
                // 完成
                isComplete = true;
                completeMessage.classList.add('show');
                breathText.style.opacity = '0';
                cycleCount.style.opacity = '0';
                breathCircle.style.opacity = '0.3';
                return;
            }

            currentCycle++;
            cycleCount.textContent = `呼吸周期：${currentCycle} / ${totalCycles}`;

            // 吸气 4秒
            setTimeout(() => {
                overlay.className = 'overlay inhale';
                breathCircle.className = 'breath-circle inhale';
                updateText('inhale');
                playBreathSound('inhale');
            }, 100);

            // 屏息 2秒
            setTimeout(() => {
                overlay.className = 'overlay hold';
                breathCircle.className = 'breath-circle hold';
                updateText('hold');
            }, 4100);

            // 呼气 4秒
            setTimeout(() => {
                overlay.className = 'overlay exhale';
                breathCircle.className = 'breath-circle exhale';
                updateText('exhale');
                playBreathSound('exhale');
            }, 6100);

            // 下一周期
            setTimeout(() => {
                breatheCycle();
            }, 10100);
        }

        // 开始呼吸
        setTimeout(() => {
            updateText('inhale');
            breatheCycle();
        }, 1500);

        // 点击关闭
        overlay.addEventListener('click', () => {
            overlay.style.transition = 'opacity 0.5s';
            overlay.style.opacity = '0';
            setTimeout(() => window.close(), 500);
        });
    </script>
</body>
</html>
