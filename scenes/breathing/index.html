<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸引导 — Claude</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #120810;
    cursor: none;
  }

  .bg-screenshot {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    filter: blur(30px) brightness(0.15);
  }

  /* -- 整体布局 -- */
  #layout {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 6vh;
  }

  /* -- Claude Logo 背景墙 — 全屏重复纹理 -- */
  #logo-wall {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background: #1e1a1c;
  }
  #logo-wall .logo-pattern {
    position: absolute; inset: 0;
    background-color: #080810;
    background-image: url('claude-logo-dark.png');
    background-size: 480px auto;
    background-position: 0 0;
    background-repeat: repeat;
    opacity: 0.75;
  }

  /* -- 视频容器 -- */
  #video-frame {
    position: relative;
    width: min(68vw, 88vh * 16 / 9);
    height: min(68vw * 9 / 16, 88vh);
    aspect-ratio: 16 / 9;
    border-radius: 16px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 0 60px rgba(180, 60, 100, 0.15), 0 0 120px rgba(180, 60, 100, 0.08);
  }
  #breathing-video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* -- 底部提示区域 -- */
  #hud-bottom {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 2vh;
    padding-bottom: 1vh;
    min-height: 20vh;
    width: 100%;
  }

  /* -- 阶段文字 -- */
  #phase-text {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 300;
    color: rgba(255, 220, 235, 0.9);
    letter-spacing: 8px;
    transition: opacity 0.4s ease, transform 0.4s ease;
    text-align: center;
    min-height: 1.2em;
  }

  /* -- 教练提示 -- */
  #coach-text {
    margin-top: 16px;
    font-size: clamp(20px, 3.5vw, 34px);
    color: rgba(255, 190, 210, 0.85);
    font-weight: 300;
    font-style: italic;
    text-align: center;
    transition: opacity 0.5s ease;
    line-height: 1.7;
    max-width: 80vw;
    min-height: 1.8em;
    padding: 0 4vw;
  }

  /* -- 进度条 -- */
  #progress-wrap {
    margin-top: auto;
    padding-top: 2vh;
    width: min(40vw, 280px);
    text-align: center;
    flex-shrink: 0;
  }
  #progress-track {
    width: 100%;
    height: 2px;
    background: rgba(255, 180, 200, 0.12);
    border-radius: 1px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(255,180,200,0.5), rgba(255,120,160,0.8));
    border-radius: 1px;
    transition: width 0.3s ease;
  }
  #progress-label {
    margin-top: 6px;
    font-size: clamp(10px, 1.2vw, 12px);
    color: rgba(255, 200, 220, 0.25);
    letter-spacing: 2px;
  }

  /* -- 关闭提示 -- */
  #close-hint {
    position: fixed;
    bottom: 2vh; right: 3vw;
    z-index: 100;
    font-size: 11px;
    color: rgba(255,200,220,0.15);
    letter-spacing: 1px;
    pointer-events: all;
    cursor: pointer;
  }

  /* -- 完成画面 -- */
  #complete {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20000;
    opacity: 0; pointer-events: none;
    transition: opacity 1.2s ease;
    background: rgba(18, 8, 16, 0.85);
    backdrop-filter: blur(16px);
  }
  #complete.show { opacity: 1; pointer-events: all; }
  #complete h2 {
    font-size: clamp(24px, 5vw, 42px); font-weight: 300;
    color: rgba(255,220,235,0.9); letter-spacing: 8px; margin-bottom: 14px;
  }
  #complete p {
    font-size: clamp(16px, 2.5vw, 22px); color: rgba(255,190,210,0.7);
    font-weight: 300; text-align: center; line-height: 1.7; max-width: 440px;
  }
  #complete-btn {
    margin-top: 36px; padding: 10px 36px;
    border: 1px solid rgba(255,200,220,0.25); border-radius: 30px;
    background: transparent; color: rgba(255,200,220,0.6);
    font-size: clamp(12px, 1.5vw, 15px); letter-spacing: 3px;
    cursor: pointer; font-family: inherit;
    transition: background 0.3s, border-color 0.3s;
  }
  #complete-btn:hover {
    background: rgba(255,200,220,0.08);
    border-color: rgba(255,200,220,0.4);
  }
</style>
</head>
<body>

<div class="bg-screenshot"></div>

<!-- Claude Logo 背景墙 -->
<div id="logo-wall">
  <div class="logo-pattern"></div>
</div>

<div id="layout">
  <div id="video-frame">
    <video id="breathing-video" autoplay muted playsinline>
      <source src="breathing.mp4" type="video/mp4">
    </video>
  </div>

  <div id="hud-bottom">
    <div id="phase-text"></div>
    <div id="coach-text"></div>
    <div id="progress-wrap">
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="progress-label"><span id="cur">0</span> / 3</div>
    </div>
  </div>
</div>

<div id="close-hint">点击任意位置关闭</div>

<div id="complete">
  <h2>很好</h2>
  <p>三组呼吸完成......<br>你的前列腺正在为你鼓掌......</p>
  <button id="complete-btn">关闭</button>
</div>

<script>
const TOTAL_CYCLES = 3;
const VIDEO_DURATION = 10;

const PHASE_TIMING = {
  tighten: { start: 0, end: 4 },
  hold:    { start: 4, end: 6 },
  release: { start: 6, end: 10 },
};

const COACH_LINES = {
  tighten: [
    "吸气......同时轻轻收紧......你的骨盆底肌......",
    "想象你在憋尿的感觉......对......就是那个位置......",
    "吸气......把骨盆底的肌肉......慢慢往上提......",
    "像坐电梯一样......一楼......一楼......慢慢上升......",
    "感受......骨盆底肌......在向内收缩......",
    "吸气......想象你在用那块肌肉......夹住一枚硬币......",
  ],
  hold: [
    "屏住......保持收紧......感受那里的力量......",
    "很好......继续保持......你的前列腺正在感谢你......",
    "稳住......就像你在开会时......忍住了那个屁......",
    "保持......让你的骨盆底肌......记住这个感觉......",
    "不错......感受肌肉......在你体内静静工作......",
  ],
  release: [
    "呼气......慢慢放松......让一切自然松开......",
    "缓缓松开......就像羽毛落地的速度......",
    "呼气......感受放松后......那股舒适感......",
    "慢慢放......不要一下子松掉......要有控制地放开......",
    "呼气......让你的骨盆底......像花瓣一样展开......",
    "放松......给那些肌肉......一个温柔的拥抱......",
  ],
};

const TRANSITION_LINES = [
  "不错......保持专注......我们再来一组......",
  "你的括约肌正在变强......再来......",
  "很好......保持这个节奏......下一组......",
  "深呼吸......调整一下......我们继续......",
];

const OPENING_LINES = [
  "每天坐在椅子上十个小时......你那个部位......需要一点关爱......",
  "准备好......这不是普通的呼吸练习......",
  "让我们做一组......对前列腺友好的训练......",
];

const video     = document.getElementById('breathing-video');
const phaseEl   = document.getElementById('phase-text');
const coachEl   = document.getElementById('coach-text');
const curEl     = document.getElementById('cur');
const progFill  = document.getElementById('progress-fill');
const compEl    = document.getElementById('complete');
const closeBtn  = document.getElementById('complete-btn');


let actx = null;
function getAudioCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function tone(freq, dur, vol) {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function setPhaseText(text) {
  phaseEl.style.opacity = '0';
  phaseEl.style.transform = 'translateY(6px)';
  setTimeout(() => {
    phaseEl.textContent = text;
    phaseEl.style.opacity = '1';
    phaseEl.style.transform = 'translateY(0)';
  }, 250);
}

function setCoachText(text) {
  coachEl.style.opacity = '0';
  setTimeout(() => {
    coachEl.textContent = text;
    coachEl.style.opacity = text ? '1' : '0';
  }, 350);
}

let cycle = 0;
let phaseTimer = null;

function runCycle() {
  if (cycle >= TOTAL_CYCLES) { showComplete(); return; }

  cycle++;
  curEl.textContent = cycle;
  video.currentTime = 0;
  video.play().catch(() => {});
  tone(340, 0.5, 0.06);

  setPhaseText('吸气 收紧');
  setCoachText(pick(COACH_LINES.tighten));

  phaseTimer = setTimeout(() => {
    tone(420, 0.3, 0.04);
    setPhaseText('屏住');
    setCoachText(pick(COACH_LINES.hold));
  }, PHASE_TIMING.hold.start * 1000);

  phaseTimer = setTimeout(() => {
    tone(290, 0.5, 0.05);
    setPhaseText('呼气 放松');
    setCoachText(pick(COACH_LINES.release));
  }, PHASE_TIMING.release.start * 1000);

  phaseTimer = setTimeout(() => {
    video.pause();
    if (cycle < TOTAL_CYCLES) {
      setPhaseText('');
      setCoachText(pick(TRANSITION_LINES));
      phaseTimer = setTimeout(runCycle, 2000);
    } else {
      runCycle();
    }
  }, VIDEO_DURATION * 1000);
}

function updateProgress() {
  if (video && !video.paused && !video.ended) {
    const progress = ((cycle - 1) + video.currentTime / VIDEO_DURATION) / TOTAL_CYCLES;
    progFill.style.width = (progress * 100) + '%';
  }
  requestAnimationFrame(updateProgress);
}

function showComplete() {
  setPhaseText('');
  setCoachText('');
  progFill.style.width = '100%';
  tone(523, 0.8, 0.1);
  setTimeout(() => tone(659, 1.0, 0.1), 200);
  setTimeout(() => tone(784, 1.2, 0.1), 400);
  setTimeout(() => compEl.classList.add('show'), 800);
  fetch('http://localhost:3721/api/scene-complete', { method: 'POST' }).catch(() => {});
}

closeBtn.addEventListener('click', () => window.close());
document.addEventListener('click', (e) => {
  if (!compEl.classList.contains('show')) window.close();
});
compEl.addEventListener('click', (e) => e.stopPropagation());

try {
  const el = document.documentElement;
  const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (rfs) rfs.call(el);
} catch(e) {}

video.addEventListener('loadeddata', () => {
  setTimeout(() => {
    setPhaseText('准备好了吗');
    setCoachText(pick(OPENING_LINES));
    tone(350, 0.4, 0.04);
    setTimeout(() => tone(440, 0.4, 0.04), 400);
    setTimeout(() => { runCycle(); updateProgress(); }, 2500);
  }, 500);
});

video.addEventListener('error', () => {
  document.body.style.background = '#120810';
  video.style.display = 'none';
  setTimeout(() => {
    setPhaseText('准备好了吗');
    setCoachText(pick(OPENING_LINES));
    setTimeout(runCycle, 2500);
  }, 500);
});
</script>
</body>
</html>
