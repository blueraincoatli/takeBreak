<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸引导 — Claude</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }

  /* 粉色渐变背景 */
  #bg {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 40%, #f48fb1 100%);
    z-index: 0;
  }

  /* 遮罩层，让边缘更柔和 */
  #bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(200,80,120,0.15) 100%);
  }

  /* 装饰光晕 */
  .glow {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(60px);
    opacity: 0.35;
    z-index: 1;
  }
  .glow-1 {
    width: 50vw; height: 50vw;
    top: -10vw; left: -10vw;
    background: #f8bbd0;
  }
  .glow-2 {
    width: 40vw; height: 40vw;
    bottom: -8vw; right: -8vw;
    background: #f48fb1;
  }
  .glow-3 {
    width: 30vw; height: 30vw;
    top: 40%; left: 60%;
    background: #fce4ec;
  }

  /* 主容器 */
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
  }

  /* Claude Logo 外圈光环 */
  #halo {
    position: absolute;
    width: calc(min(70vw, 70vh));
    height: calc(min(70vw, 70vh));
    border-radius: 50%;
    border: 1.5px solid rgba(200,80,120,0.2);
    pointer-events: none;
  }

  /* Logo 容器 */
  #logo-wrap {
    position: relative;
    width: calc(min(55vw, 55vh));
    height: calc(min(55vw, 55vh));
    display: flex; align-items: center; justify-content: center;
    transition: transform 4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    will-change: transform;
  }

  /* Claude Logo SVG */
  #claude-logo {
    width: 85%;
    height: 85%;
    filter: drop-shadow(0 8px 32px rgba(200,80,120,0.3));
    transition: filter 4s ease;
  }

  /* 呼吸进度环 */
  #progress-ring {
    position: absolute;
    inset: -8%;
    pointer-events: none;
  }
  #progress-ring circle.track {
    fill: none;
    stroke: rgba(200,80,120,0.12);
    stroke-width: 3;
  }
  #progress-ring circle.fill {
    fill: none;
    stroke: rgba(200,80,120,0.5);
    stroke-width: 3;
    stroke-linecap: round;
    transform-origin: center;
    transform: rotate(-90deg);
    transition: stroke-dashoffset 0.3s ease;
  }

  /* 顶部标题 */
  #header {
    position: fixed;
    top: 8vh;
    text-align: center;
    z-index: 20;
  }
  #header h1 {
    font-size: clamp(18px, 3.5vw, 28px);
    font-weight: 300;
    color: rgba(150,50,80,0.8);
    letter-spacing: 8px;
    text-transform: uppercase;
  }
  #cycle-counter {
    margin-top: 6px;
    font-size: clamp(12px, 1.8vw, 16px);
    color: rgba(150,50,80,0.5);
    letter-spacing: 3px;
  }

  /* 主文字提示 */
  #main-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(min(35vw, 35vh) / 2 + 40px));
    text-align: center;
    z-index: 20;
    width: 90vw;
    max-width: 600px;
  }
  #phase-label {
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 500;
    color: rgba(150,40,70,0.95);
    letter-spacing: 2px;
    min-height: 1.4em;
    transition: opacity 0.4s ease;
  }
  #sub-text {
    margin-top: 12px;
    font-size: clamp(13px, 2vw, 18px);
    color: rgba(150,40,70,0.6);
    font-weight: 300;
    min-height: 1.4em;
    letter-spacing: 1px;
    transition: opacity 0.4s ease;
  }

  /* 计数圆圈 */
  #countdown {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(min(35vw, 35vh) / 2 + 40px));
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 200;
    color: rgba(200,60,100,0.9);
    z-index: 25;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    font-variant-numeric: tabular-nums;
  }

  /* 文案池文字 */
  #quip {
    position: fixed;
    bottom: 18vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    width: 85vw;
    max-width: 500px;
  }
  #quip-text {
    font-size: clamp(14px, 2.2vw, 20px);
    color: rgba(150,40,70,0.5);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.8s ease;
    line-height: 1.6;
  }
  #quip-text.visible {
    opacity: 1;
  }

  /* 进度条 */
  #progress-bar {
    position: fixed;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    width: min(60vw, 300px);
    z-index: 20;
  }
  #progress-bar-track {
    height: 2px;
    background: rgba(200,80,120,0.2);
    border-radius: 1px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f48fb1, #ec407a);
    border-radius: 1px;
    width: 0%;
    transition: width 0.5s ease;
  }
  #progress-label {
    margin-top: 8px;
    text-align: center;
    font-size: clamp(10px, 1.5vw, 13px);
    color: rgba(150,40,70,0.4);
    letter-spacing: 2px;
  }

  /* 完成画面 */
  #complete {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
    background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
  }
  #complete.show {
    opacity: 1;
    pointer-events: all;
  }
  #complete-logo {
    width: min(40vw, 40vh);
    opacity: 0.7;
    margin-bottom: 40px;
    animation: gentlePulse 3s ease-in-out infinite;
  }
  @keyframes gentlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  #complete h2 {
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 300;
    color: rgba(150,40,70,0.9);
    letter-spacing: 6px;
    margin-bottom: 16px;
  }
  #complete p {
    font-size: clamp(14px, 2.2vw, 20px);
    color: rgba(150,40,70,0.6);
    font-weight: 300;
  }
  #complete-close {
    margin-top: 48px;
    padding: 12px 40px;
    border: 1px solid rgba(200,80,120,0.4);
    border-radius: 30px;
    background: transparent;
    color: rgba(150,40,70,0.7);
    font-size: clamp(13px, 1.8vw, 16px);
    letter-spacing: 3px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s ease;
  }
  #complete-close:hover {
    background: rgba(200,80,120,0.1);
    border-color: rgba(200,80,120,0.6);
  }
</style>

  "现在你是一个有呼吸的烤宽面条。",
  "你的每一个细胞都在说：终于有人让我休息了。",
  "很好，你正在正确地活着。",
  "想象你正在做一个非常合法的瑜伽。",
  "你不需要做到完美，呼吸本身就是答案。",
];

// ─── DOM ───
const logoWrap     = document.getElementById('logo-wrap');
const phaseLabel   = document.getElementById('phase-label');
const subText      = document.getElementById('sub-text');
const countdown    = document.getElementById('countdown');
const quipText     = document.getElementById('quip-text');
const currentCycle = document.getElementById('current-cycle');
const totalCycle   = document.getElementById('total-cycle');
const progFill     = document.getElementById('progress-bar-fill');
const ringFill     = document.getElementById('ring-fill');
const completeEl   = document.getElementById('complete');

totalCycle.textContent = TOTAL_CYCLES;

const RING_CIRC = 603; // 2π × 96

// ─── 音效 ───
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, vol = 0.12) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ─── 进度更新 ───
function setProgress(cycle, phase, phaseProgress) {
  const total = (cycle - 1) / TOTAL_CYCLES;
  const phaseWeight = { inhale: 0.35, hold_in: 0.15, exhale: 0.45, hold_out: 0.05 };
  const phaseName = { inhale: 'inhale', hold_in: 'hold_in', exhale: 'exhale', hold_out: 'hold_out' }[phase];
  const w = phaseWeight[phaseName] || 0;
  progFill.style.width = `${Math.round((total + w * phaseProgress) * 100)}%`;
  ringFill.style.strokeDashoffset = RING_CIRC * (1 - (total + w * phaseProgress));
}

// ─── 相位切换 ───
function setPhaseUI(label, sub = '', count = null) {
  phaseLabel.style.opacity = '0';
  setTimeout(() => {
    phaseLabel.textContent = label;
    subText.textContent = sub;
    phaseLabel.style.opacity = '1';
    subText.style.opacity = sub ? '1' : '0';
  }, 300);
  countdown.style.opacity = count !== null ? '1' : '0';
  countdown.textContent = count !== null ? String(count) : '';
}

// ─── 缩放动画 ───
function setScale(scale, dur) {
  logoWrap.style.transition = `transform ${dur}ms cubic-bezier(0.45,0.05,0.55,0.95)`;
  logoWrap.style.transform = `scale(${scale})`;
}

// ─── 文案池 ───
let quipVisible = false;
function showQuip(cycle) {
  if (cycle < 3) return; // 前两轮不插文案
  if (quipVisible) {
    quipText.classList.remove('visible');
    quipVisible = false;
  }
  // 40% 概率插一条
  if (Math.random() < 0.4) {
    const text = QUIPS[Math.floor(Math.random() * QUIPS.length)];
    quipText.textContent = text;
    quipText.classList.add('visible');
    quipVisible = true;
    // 3 秒后消失
    setTimeout(() => {
      quipText.classList.remove('visible');
      quipVisible = false;
    }, 3200);
  }
}

// ─── 屏息倒计时 ───
function countdownHold(sec) {
  let n = sec;
  countdown.textContent = n;
  countdown.style.opacity = '1';
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      countdown.style.opacity = '0';
    } else {
      countdown.textContent = n;
      playTone(440, 0.15, 0.08);
    }
  }, 1000);
  playTone(440, 0.15, 0.08); // 首秒
}

// ─── 进度动画 ───
let animFrame = null;
function animateProgress(phase, dur, cycle) {
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / dur, 1);
    setProgress(cycle, phase, t);
    if (t < 1) animFrame = requestAnimationFrame(tick);
  }
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(tick);
}

// ─── 主循环 ───
let cycle = 0;

function breathe() {
  if (cycle >= TOTAL_CYCLES) {
    showComplete(); return;
  }
  cycle++;
  currentCycle.textContent = cycle;

  const p = PHASE;

  // ── 吸气 ──
  setPhaseUI('缓缓吸气……', '让气息沉入腹部', null);
  setScale(p.INHALE.scale, p.INHALE.dur);
  animateProgress('inhale', p.INHALE.dur, cycle);
  playTone(300, 0.6, 0.06);

  // ── 吸气末提示文案 ──
  setTimeout(() => showQuip(cycle), p.INHALE.dur * 0.6);

  // ── 屏息 ──
  const holdStart = p.INHALE.dur;
  setTimeout(() => {
    setPhaseUI('屏住呼吸……', '保持不动，感受气息在身体里', null);
    countdownHold(3);
    animateProgress('hold_in', p.HOLD_IN.dur, cycle);
  }, holdStart);

  // ── 呼气 ──
  const exhaleStart = holdStart + p.HOLD_IN.dur;
  setTimeout(() => {
    setPhaseUI('缓缓放松……', '让气息自然流出', null);
    setScale(p.EXHALE.scale, p.EXHALE.dur);
    animateProgress('exhale', p.EXHALE.dur, cycle);
    playTone(260, 0.6, 0.06);
  }, exhaleStart);

  // ── 短暂屏息（底部） ──
  const holdOutStart = exhaleStart + p.EXHALE.dur;
  setTimeout(() => {
    setPhaseUI('轻轻停留', '', null);
    animateProgress('hold_out', p.HOLD_OUT.dur, cycle);
  }, holdOutStart);

  // ── 下一轮 ──
  const nextStart = holdOutStart + p.HOLD_OUT.dur;
  setTimeout(breathe, nextStart);
}

// ─── 完成 ───
function showComplete() {
  setPhaseUI('', '');
  quipText.classList.remove('visible');
  playTone(523, 0.8, 0.15);
  playTone(659, 1.0, 0.15);
  playTone(784, 1.2, 0.15);
  setTimeout(() => completeEl.classList.add('show'), 800);
  // 通知主应用
  fetch('http://localhost:3721/api/scene-complete', { method: 'POST' }).catch(() => {});
}

// ─── 启动 ───
setTimeout(breathe, 1800);
</script>
