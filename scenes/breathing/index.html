<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸引导 — Claude</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }

  /* 背景 — 水母色呼吸 */
  #bg {
    position: fixed; inset: 0;
    background: #fce4ec;
    transition: background 4s ease-in-out;
    z-index: 0;
  }

  /* 柔和内光 */
  #bg::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 45%,
      rgba(255,200,220,0.6) 0%,
      transparent 70%);
    pointer-events: none;
  }

  /* ─── Logo 区域 ─── */
  #scene {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }

  /* 背景放射层 SVG — 在 logo 背后 */
  #rays-svg {
    position: absolute;
    width: calc(min(80vw, 80vh));
    height: calc(min(80vw, 80vh));
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    overflow: visible;
    z-index: 1;
  }

  /* 每条放射线 */
  .ray {
    stroke: rgba(192, 64, 120, 0.35);
    stroke-linecap: round;
    transform-origin: 50% 50%;
    transition: opacity 0.5s ease;
  }

  /* ─── Claude Logo ─── */
  #claude-logo {
    position: relative; z-index: 5;
    width: calc(min(42vw, 42vh));
    height: calc(min(42vw, 42vh));
    filter: drop-shadow(0 0 0px rgba(192,64,120,0));
    transition: filter 4s ease;
  }

  /* ─── 顶部 ─── */
  #header {
    position: fixed; top: 7vh;
    text-align: center; width: 100%;
    z-index: 20;
  }
  #header h1 {
    font-size: clamp(16px, 3vw, 26px);
    font-weight: 300; letter-spacing: 10px;
    color: rgba(150,40,75,0.75); text-transform: uppercase;
  }
  #cycle-counter {
    margin-top: 8px;
    font-size: clamp(11px, 1.6vw, 15px);
    color: rgba(150,40,75,0.45); letter-spacing: 3px;
  }

  /* ─── 主文字 ─── */
  #main-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(min(42vw, 42vh) / 2 + 70px));
    text-align: center; width: 90vw; max-width: 580px;
    z-index: 20;
  }
  #phase-label {
    font-size: clamp(18px, 3.8vw, 30px);
    font-weight: 500; letter-spacing: 2px;
    color: rgba(140,35,70,0.95);
    min-height: 1.5em;
    transition: opacity 0.35s ease;
  }
  #sub-label {
    margin-top: 10px;
    font-size: clamp(12px, 1.8vw, 17px);
    color: rgba(140,35,70,0.55); font-weight: 300;
    min-height: 1.4em; letter-spacing: 1px;
    transition: opacity 0.35s ease;
  }

  /* 屏息大数字 */
  #countdown {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(min(42vw, 42vh) / 2 + 70px));
    font-size: clamp(30px, 6vw, 54px); font-weight: 200;
    color: rgba(192,60,100,0.85);
    z-index: 25; opacity: 0;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  /* ─── 文案池 ─── */
  #quip {
    position: fixed; bottom: 16vh;
    left: 50%; transform: translateX(-50%);
    width: 82vw; max-width: 460px;
    text-align: center; z-index: 20;
  }
  #quip-text {
    font-size: clamp(13px, 2vw, 19px);
    color: rgba(140,35,70,0.48); font-weight: 300;
    font-style: italic; letter-spacing: 0.5px;
    opacity: 0; transition: opacity 0.9s ease;
    line-height: 1.7;
  }
  #quip-text.visible { opacity: 1; }

  /* ─── 进度条 ─── */
  #prog {
    position: fixed; bottom: 9vh;
    left: 50%; transform: translateX(-50%);
    width: min(55vw, 280px);
    z-index: 20;
  }
  #prog-track {
    height: 2px; background: rgba(192,64,120,0.18);
    border-radius: 1px; overflow: hidden;
  }
  #prog-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #f48fb1, #ec407a);
    border-radius: 1px; transition: width 0.6s ease;
  }
  #prog-label {
    margin-top: 8px; text-align: center;
    font-size: clamp(10px, 1.4vw, 12px);
    color: rgba(140,35,70,0.38); letter-spacing: 2px;
  }

  /* ─── 完成画面 ─── */
  #complete {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; opacity: 0;
    pointer-events: none;
    transition: opacity 1.4s ease;
    background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 55%, #f48fb1 100%);
  }
  #complete.show { opacity: 1; pointer-events: all; }
  #complete h2 {
    font-size: clamp(22px, 5vw, 40px); font-weight: 300;
    color: rgba(140,35,70,0.9); letter-spacing: 8px; margin-bottom: 14px;
  }
  #complete p {
    font-size: clamp(13px, 2vw, 19px); color: rgba(140,35,70,0.6);
    font-weight: 300; text-align: center; line-height: 1.7;
    max-width: 380px;
  }
  #complete-logo {
    width: min(35vw, 35vh); margin-bottom: 36px;
    animation: gentleBreath 5s ease-in-out infinite;
    opacity: 0.75;
  }
  @keyframes gentleBreath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #complete-btn {
    margin-top: 44px; padding: 12px 42px;
    border: 1px solid rgba(192,64,120,0.35);
    border-radius: 30px; background: transparent;
    color: rgba(140,35,70,0.7);
    font-size: clamp(12px, 1.6vw, 15px); letter-spacing: 3px;
    cursor: pointer; font-family: inherit;
    transition: background 0.3s, border-color 0.3s;
  }
  #complete-btn:hover {
    background: rgba(192,64,120,0.1);
    border-color: rgba(192,64,120,0.55);
  }
</style>

<script>
// ─── 放射线生成 ───
// Logo 半径约占 viewBox 40%（从中心到边缘）
// 放射线从 logo 边缘开始，向外延伸至 viewBox 边缘
const CX = 200, CY = 200;
const LOGO_R = 78;   // logo 边缘在 SVG viewBox 中的半径（px）
const OUTER_R = 195;  // 最长线条端点
const NUM_RAYS = 24;  // 24 条线，每 15° 一条
const raysSvg = document.getElementById('rays-svg');

// 生成线条
const rays = [];
for (let i = 0; i < NUM_RAYS; i++) {
  const angle = (i * 360 / NUM_RAYS) * Math.PI / 180;
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  el.setAttribute('x1', CX); el.setAttribute('y1', CY);
  el.setAttribute('x2', CX); el.setAttribute('y2', CY);
  el.setAttribute('stroke-width', '1.5');
  el.classList.add('ray');
  // 加一点随机偏移，让线条起始位置不完全重合
  const jitterR = LOGO_R + Math.random() * 4 - 2;
  el._bx = CX + jitterR * Math.cos(angle);
  el._by = CY + jitterR * Math.sin(angle);
  el._angle = angle;
  el._length = OUTER_R - jitterR;
  raysSvg.appendChild(el);
  rays.push(el);
}

// 呼吸状态：0=contracted(呼气末), 1=expanded(吸气末)
let breathLevel = 0; // 当前进度 0~1
let animRunning = false;

function setRays(level) {
  // level: 0 = 最短(收缩), 1 = 最长(展开)
  rays.forEach((ray, i) => {
    const delay = (i / NUM_RAYS) * 0.25; // 相位错开，形成波浪感
    const t = Math.max(0, Math.min(1, level + delay));
    const len = ray._length * t;
    const opacity = t * 0.45;
    const x2 = ray._bx + len * Math.cos(ray._angle);
    const y2 = ray._by + len * Math.sin(ray._angle);
    ray.setAttribute('x2', x2);
    ray.setAttribute('y2', y2);
    ray.style.stroke = `rgba(192, 64, 120, ${opacity.toFixed(3)})`;
    ray.style.strokeWidth = `${1 + t * 0.8}px`;
  });
}

// 初始：收缩状态
setRays(0);

// ─── 背景色 ───
// 浅色 = 吸气(展开)，深色 = 呼气(收缩)
const BG_LIGHT = '#fce4ec';
const BG_DEEP  = '#ec407a';
function setBg(level) {
  // lerp between deep (0) and light (1)
  // level 0 -> deep, level 1 -> light
  // Use HSL interpolation for smooth color transition
  // bg transition handled by CSS transition, we just change a CSS var
  const lightness = 92 - level * 18; // 92 (light) to 74 (deep)
  const sat = 70 + level * 14;       // 70 to 84
  document.getElementById('bg').style.background =
    `linear-gradient(160deg, hsl(340,${sat}%,${lightness}%) 0%, hsl(340,${sat+8}%,${lightness-4}%) 100%)`;
}

// ─── 配置 ───
const TOTAL = 20;
const T = {
  inhale:   { dur: 4000 },
  holdIn:   { dur: 3000 },
  exhale:   { dur: 4000 },
  holdOut:  { dur: 1000 },
};

// ─── 文案池 ───
const QUIPS = [
  "你的前列腺正在感谢你。",
  "把意识轻轻放在你的骨盆底肌上。",
  "感受气体在你的腹腔里流动。",
  "很好，现在假装你在闻一朵花。",
  "把你的尾骨轻轻向上提……对，就是那个感觉。",
  "呼吸是生命给你的免费礼物。",
  "想象你是一株正在光合作用的植物。",
  "很好，你的横膈膜在说谢谢。",
  "现在你是一个会呼吸的咖啡杯。",
  "把烦恼呼出去，把平静吸进来。",
  "很好，你的肺正在做它们最擅长的事。",
  "想象你的脊椎是一串正在放松的珍珠。",
  "现在你是一个正在冥想的水母。",
  "很好，你的每一次呼吸都在修复你。",
  "把你的注意力放在你的耻骨联合处。",
  "你正在解锁「活着」这个成就。",
  "很好，你的迷走神经被激活了。",
  "想象你是一棵正在蒸腾作用的树。",
  "把焦虑呼出去，反正它也不会回来。",
  "很好，你现在是有机呼吸生物。",
  "你不是在摸鱼，你是在正念呼吸。",
  "感受空气穿过你的鼻毛……很滋养。",
  "现在你是一个呼吸着的数据包。",
  "很好，你的含氧量正在悄悄提升。",
  "你正在为你的线粒体充值。",
  "想象你是一块正在午睡的岩石。",
  "很好，你的身体正在下载平静。",
  "现在，你是海洋，深邃而宁静。",
  "想象你正在做一个非常合法的瑜伽。",
  "很好，你正在正确地活着。",
  "你不需要做到完美，呼吸本身就是答案。",
  "感受气息像一只小蛇一样滑入你的身体。",
  "你的每一个细胞都在说：终于有人让我休息了。",
  "很好，你现在是一个正在午休的甜甜圈。",
  "你不是在发呆，你是在整合信息。",
  "很好，呼气的时候想象你在倒一杯红酒。",
  "现在你的身体正在生产血清素。",
  "想象你的压力像沙子一样从指缝漏下去。",
];

// ─── DOM ───
const phaseEl   = document.getElementById('phase-label');
const subEl     = document.getElementById('sub-label');
const countEl   = document.getElementById('countdown');
const quipEl    = document.getElementById('quip-text');
const curEl     = document.getElementById('cur');
const totEl     = document.getElementById('tot');
const progFill  = document.getElementById('prog-fill');
const compEl    = document.getElementById('complete');

totEl.textContent = TOTAL;

// ─── 音效 ───
let actx = null;
function ac() { if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(f, d, v=0.12) {
  try {
    const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(v, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + d);
  } catch(e) {}
}

// ─── 文字 ───
function setText(main, sub='') {
  phaseEl.style.opacity = '0';
  subEl.style.opacity = '0';
  setTimeout(() => {
    phaseEl.textContent = main;
    subEl.textContent = sub;
    phaseEl.style.opacity = '1';
    subEl.style.opacity = sub ? '1' : '0';
  }, 280);
}

// ─── 呼吸动画（线性插值射线） ───
let breatheTimer = null;
let quipTimer = null;
let holdCountTimer = null;
let cycleCount = 0;

function animateRays(targetLevel, dur) {
  const start = performance.now();
  const startLevel = breathLevel;
  function tick(now) {
    const t = Math.min((now - start) / dur, 1);
    // ease in-out
    const et = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    breathLevel = startLevel + (targetLevel - startLevel) * et;
    setRays(breathLevel);
    setBg(breathLevel);
    // progress bar
    const pct = ((cycleCount - 1) / TOTAL + breathLevel / TOTAL) * 100;
    progFill.style.width = pct.toFixed(1) + '%';
    if (t < 1) breatheTimer = requestAnimationFrame(tick);
  }
  if (breatheTimer) cancelAnimationFrame(breatheTimer);
  breatheTimer = requestAnimationFrame(tick);
}

// 屏息倒计时
function holdCountdown(sec) {
  let n = sec;
  countEl.style.opacity = '1';
  countEl.textContent = n;
  tone(440, 0.12, 0.09);
  holdCountTimer = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(holdCountTimer);
      countEl.style.opacity = '0';
    } else {
      countEl.textContent = n;
      tone(440, 0.12, 0.09);
    }
  }, 1000);
}

// 文案
function maybeQuip(c) {
  if (c < 3) return;
  if (quipTimer) clearTimeout(quipTimer);
  if (quipEl.classList.contains('visible')) {
    quipEl.classList.remove('visible');
    setTimeout(() => showQuip(c), 400);
  } else {
    showQuip(c);
  }
}
function showQuip(c) {
  if (Math.random() < 0.38) {
    quipEl.textContent = QUIPS[Math.floor(Math.random() * QUIPS.length)];
    quipEl.classList.add('visible');
    quipTimer = setTimeout(() => quipEl.classList.remove('visible'), 3500);
  }
}

// ─── 主循环 ───
function breatheCycle() {
  if (cycleCount >= TOTAL) { showComplete(); return; }
  cycleCount++;
  curEl.textContent = cycleCount;

  const { inhale: i, holdIn: h, exhale: e, holdOut: o } = T;
  const total = i.dur + h.dur + e.dur + o.dur;

  // — 吸气 —
  setText('缓缓吸气……', '让气息沉入腹部');
  tone(280, 0.5, 0.05);
  animateRays(1.0, i.dur);
  // 文案概率触发
  setTimeout(() => maybeQuip(cycleCount), i.dur * 0.55);

  // — 屏息 —
  setTimeout(() => {
    setText('屏住呼吸……', '保持不动');
    holdCountdown(3);
  }, i.dur);

  // — 呼气 —
  setTimeout(() => {
    countEl.style.opacity = '0';
    if (holdCountTimer) clearInterval(holdCountTimer);
    setText('缓缓放松……', '让气息自然流出');
    tone(250, 0.5, 0.05);
    animateRays(0, e.dur);
  }, i.dur + h.dur);

  // — 底部短暂停留 —
  setTimeout(() => {
    setText('轻轻停留', '');
  }, i.dur + h.dur + e.dur);

  // — 下一轮 —
  setTimeout(breatheCycle, total);
}

// ─── 完成 ───
function showComplete() {
  setText('', '');
  quipEl.classList.remove('visible');
  tone(523, 0.9, 0.14);
  setTimeout(() => tone(659, 1.0, 0.14), 250);
  setTimeout(() => tone(784, 1.3, 0.14), 500);
  setTimeout(() => compEl.classList.add('show'), 900);
  fetch('http://localhost:3721/api/scene-complete', {method:'POST'}).catch(()=>{});
}

// 3秒后开始
setTimeout(breatheCycle, 3000);
</script>
