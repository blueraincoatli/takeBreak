<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功德+1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        .bg-screenshot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000 no-repeat center center;
            background-size: 100vw 100vh;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 10000;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
            background: linear-gradient(180deg, 
                rgba(139, 90, 43, 0.9) 0%, 
                rgba(101, 67, 33, 0.95) 50%,
                rgba(62, 39, 35, 0.98) 100%);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 寺庙风格装饰边框 */
        .temple-border {
            position: fixed;
            top: 2%;
            left: 2%;
            right: 2%;
            bottom: 2%;
            border: 3px solid #D4AF37;
            border-radius: 10px;
            pointer-events: none;
            z-index: 1;
        }

        .temple-border::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 5px;
        }

        /* 顶部文字 */
        .header-text {
            position: fixed;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(20px, 4vw, 36px);
            color: #D4AF37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 8px;
            z-index: 10;
            opacity: 0;
            animation: slideDown 0.8s ease 0.3s forwards;
        }

        @keyframes slideDown {
            from { 
                opacity: 0; 
                transform: translateX(-50%) translateY(-30px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(-50%) translateY(0); 
            }
        }

        /* 电子木鱼容器 */
        .wooden-fish-container {
            position: fixed;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 160px;
            z-index: 10;
            cursor: pointer;
        }

        /* 木鱼 SVG 样式 */
        .wooden-fish {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            transition: transform 0.1s;
        }

        .wooden-fish:active {
            transform: scale(0.95);
        }

        .wooden-fish.tap {
            animation: tapFish 0.15s ease;
        }

        @keyframes tapFish {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* 木鱼槌 */
        .mallet {
            position: absolute;
            top: -40px;
            right: -30px;
            width: 80px;
            height: 80px;
            transform-origin: 80% 80%;
            animation: malletTap 1s ease-in-out infinite;
        }

        @keyframes malletTap {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(10deg); }
        }

        /* 功德计数 */
        .merit-counter {
            position: fixed;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(48px, 10vw, 80px);
            font-weight: bold;
            color: #FFD700;
            text-shadow: 
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(255, 215, 0, 0.4);
            z-index: 10;
            font-family: 'SimHei', sans-serif;
        }

        .merit-label {
            font-size: clamp(20px, 4vw, 32px);
            color: #D4AF37;
            margin-left: 10px;
        }

        /* 飘浮的功德+1 */
        .floating-merit {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 100;
            animation: floatUp 1.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.3);
            }
        }

        /* 底部提示 */
        .hint-text {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(14px, 3vw, 20px);
            color: rgba(212, 175, 55, 0.8);
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeInHint 1s ease 1s forwards;
        }

        @keyframes fadeInHint {
            to { opacity: 1; }
        }

        /* 佛系文案 */
        .buddha-quote {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(16px, 3vw, 24px);
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
            z-index: 10;
            opacity: 0;
            animation: fadeInQuote 1s ease 0.5s forwards;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        @keyframes fadeInQuote {
            to { opacity: 1; }
        }

        /* 莲花装饰 */
        .lotus {
            position: fixed;
            font-size: 40px;
            opacity: 0.3;
            z-index: 1;
            animation: lotusFloat 6s ease-in-out infinite;
        }

        @keyframes lotusFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 祥云背景 */
        .cloud-pattern {
            position: fixed;
            width: 150px;
            height: 60px;
            background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-screenshot"></div>

    <!-- 祥云装饰 -->
    <div class="cloud-pattern" style="top: 15%; left: 5%;"></div>
    <div class="cloud-pattern" style="top: 20%; right: 8%;"></div>
    <div class="cloud-pattern" style="bottom: 30%; left: 10%;"></div>
    <div class="cloud-pattern" style="bottom: 35%; right: 5%;"></div>

    <!-- 莲花装饰 -->
    <div class="lotus" style="top: 10%; left: 8%; animation-delay: 0s;">🪷</div>
    <div class="lotus" style="top: 15%; right: 10%; animation-delay: 1s;">🪷</div>
    <div class="lotus" style="bottom: 20%; left: 5%; animation-delay: 2s;">🪷</div>
    <div class="lotus" style="bottom: 25%; right: 8%; animation-delay: 3s;">🪷</div>

    <div class="overlay" id="overlay">
        <div class="temple-border"></div>

        <div class="header-text">赛博拜佛</div>

        <div class="merit-counter">
            <span id="meritCount">0</span>
            <span class="merit-label">功德</span>
        </div>

        <div class="buddha-quote" id="quote">点击木鱼，休息积功德</div>

        <!-- 电子木鱼 -->
        <div class="wooden-fish-container" id="fishContainer">
            <svg class="wooden-fish" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                <!-- 木鱼主体 -->
                <ellipse cx="100" cy="100" rx="90" ry="55" fill="#8B4513"/>
                <ellipse cx="100" cy="95" rx="85" ry="50" fill="#A0522D"/>
                <ellipse cx="100" cy="90" rx="75" ry="40" fill="#CD853F"/>
                
                <!-- 木鱼纹理 -->
                <ellipse cx="100" cy="85" rx="50" ry="25" fill="#DEB887" opacity="0.5"/>
                
                <!-- 木鱼嘴/缝隙 -->
                <path d="M 60 85 Q 100 105 140 85" stroke="#5D3A1A" stroke-width="4" fill="none"/>
                
                <!-- 眼睛 -->
                <circle cx="70" cy="75" r="8" fill="#3E2723"/>
                <circle cx="72" cy="73" r="3" fill="#fff"/>
                <circle cx="130" cy="75" r="8" fill="#3E2723"/>
                <circle cx="132" cy="73" r="3" fill="#fff"/>
                
                <!-- 鱼鳞纹理 -->
                <path d="M 85 100 Q 100 110 115 100" stroke="#8B4513" stroke-width="2" fill="none" opacity="0.5"/>
                <path d="M 90 110 Q 100 118 110 110" stroke="#8B4513" stroke-width="2" fill="none" opacity="0.5"/>
                
                <!-- 尾巴 -->
                <path d="M 185 100 L 195 85 L 195 115 Z" fill="#8B4513"/>
            </svg>

            <!-- 木鱼槌 -->
            <svg class="mallet" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <!-- 槌柄 -->
                <rect x="35" y="20" width="10" height="40" fill="#8B4513" rx="2"/>
                <!-- 槌头 -->
                <circle cx="40" cy="20" r="15" fill="#D2691E"/>
                <circle cx="40" cy="18" r="12" fill="#CD853F"/>
            </svg>
        </div>

        <div class="hint-text">
            🙏 每敲一下木鱼，功德+1，久坐-1<br>
            点击任意位置关闭
        </div>
    </div>

    <script>
        let meritCount = 0;
        const quotes = [
            "休息是为了更好地搬砖",
            "佛系打工，功德无量",
            "敲鱼一时爽，一直敲一直爽",
            "今日功德已满，可以下班了",
            "赛博拜佛，物理休息",
            "积功德，防脱发",
            "敲木鱼，减压力",
            "佛系一点，工资不变"
        ];

        const fishContainer = document.getElementById('fishContainer');
        const meritDisplay = document.getElementById('meritCount');
        const quoteDisplay = document.getElementById('quote');
        const overlay = document.getElementById('overlay');

        // 自动敲击
        function autoTap() {
            tapFish();
        }

        // 敲击木鱼
        function tapFish() {
            meritCount++;
            meritDisplay.textContent = meritCount;

            // 木鱼动画
            const fish = document.querySelector('.wooden-fish');
            fish.classList.remove('tap');
            void fish.offsetWidth; // 触发重排
            fish.classList.add('tap');

            // 创建飘浮的功德+1
            createFloatingMerit();

            // 播放木鱼声
            playWoodFishSound();

            // 每10下换一句文案
            if (meritCount % 5 === 0) {
                quoteDisplay.textContent = quotes[Math.floor(Math.random() * quotes.length)];
            }
        }

        // 创建飘浮的功德+1
        function createFloatingMerit() {
            const floating = document.createElement('div');
            floating.className = 'floating-merit';
            floating.textContent = '功德+1';
            floating.style.left = (50 + (Math.random() - 0.5) * 20) + '%';
            floating.style.bottom = '35%';
            overlay.appendChild(floating);

            setTimeout(() => floating.remove(), 1500);
        }

        // 播放木鱼声
        function playWoodFishSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;

                // 木鱼声 - 短促的中频音
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);

                filter.type = 'bandpass';
                filter.frequency.value = 600;
                filter.Q.value = 5;

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(now);
                osc.stop(now + 0.15);
            } catch (e) {}
        }

        // 自动敲击
        const autoTapInterval = setInterval(autoTap, 800);

        // 点击木鱼额外加功德
        fishContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            tapFish();
        });

        // 点击关闭
        overlay.addEventListener('click', () => {
            clearInterval(autoTapInterval);
            overlay.style.transition = 'opacity 0.3s';
            overlay.style.opacity = '0';
            setTimeout(() => window.close(), 300);
        });
    </script>
</body>
</html>
