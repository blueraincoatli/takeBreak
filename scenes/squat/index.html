<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深蹲挑战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    .bg-screenshot {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000 no-repeat center center;
      background-size: 100vw 100vh;
      z-index: 0;
    }

    .scene-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 10000;
    }

    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 10001;
      opacity: 0;
    }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 10002;
    }

    /* HUD */
    .hud {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 10010;
      pointer-events: none;
    }

    .count-display {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .count-number {
      font-size: 96px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 4px 0 rgba(0,0,0,0.3);
      line-height: 1;
      transition: transform 0.15s ease;
    }

    .count-number.pop {
      transform: scale(1.3);
    }

    .count-label {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .progress-bar {
      position: absolute;
      top: 30px;
      left: 30px;
      width: 6px;
      height: calc(100vh - 60px);
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, #00ff88, #00ccff);
      border-radius: 3px;
      transition: height 0.3s ease;
    }

    .feedback-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 30px rgba(0,255,136,0.8);
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .feedback-text.show {
      opacity: 1;
    }

    .fps-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: #00ff88;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* Corner instruction */
    .corner-tip {
      position: absolute;
      bottom: 30px;
      right: 30px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-align: right;
    }

    /* Completion overlay */
    .complete-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .complete-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .complete-card {
      background: rgba(0,0,0,0.85);
      border: 2px solid #00ff88;
      border-radius: 24px;
      padding: 48px 64px;
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .complete-overlay.show .complete-card {
      transform: scale(1);
    }

    .complete-icon {
      font-size: 72px;
      margin-bottom: 16px;
    }

    .complete-title {
      font-size: 42px;
      font-weight: 900;
      color: #00ff88;
      text-shadow: 0 0 20px rgba(0,255,136,0.5);
      margin-bottom: 8px;
    }

    .complete-subtitle {
      font-size: 20px;
      color: rgba(255,255,255,0.7);
    }

    /* Loading state */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30000;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px; height: 60px;
      border: 4px solid rgba(0,255,136,0.2);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: rgba(255,255,255,0.7);
      font-size: 16px;
    }

    /* Top banner */
    .top-banner {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      padding: 18px 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      text-align: center;
      z-index: 10008;
    }

    .top-banner-text {
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .top-banner-icon {
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="bg-screenshot"></div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div class="scene-layer">
    <div class="top-banner">
      <span class="top-banner-icon">🏋️</span>
      <span class="top-banner-text">休息一下！做几个深蹲</span>
    </div>

    <div class="hud">
      <div class="count-display">
        <div class="count-number" id="countNum">0</div>
        <div class="count-label" id="countLabel">0 / 5</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="height: 0%"></div>
      </div>
      <div class="feedback-text" id="feedbackText"></div>
      <div class="fps-badge" id="fpsBadge">-- FPS</div>
      <div class="corner-tip">摄像头只在你本地运行<br>不录制，不上传</div>
    </div>

    <div class="complete-overlay" id="completeOverlay">
      <div class="complete-card">
        <div class="complete-icon">🎉</div>
        <div class="complete-title" id="completeTitle">完成！</div>
        <div class="complete-subtitle" id="completeSubtitle">太棒了！休息结束</div>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">正在加载动作检测模型...</div>
  </div>

  <script type="module">
    // ============================================================
    // MediaPipe Pose Keypoints
    // ============================================================
    const POSE_LANDMARKS = {
      NOSE: 0, LEFT_EYE_INNER: 1, LEFT_EYE: 2, LEFT_EYE_OUTER: 3,
      RIGHT_EYE_INNER: 4, RIGHT_EYE: 5, RIGHT_EYE_OUTER: 6,
      LEFT_EAR: 7, RIGHT_EAR: 8,
      MOUTH_LEFT: 9, MOUTH_RIGHT: 10,
      LEFT_SHOULDER: 11, RIGHT_SHOULDER: 12,
      LEFT_ELBOW: 13, RIGHT_ELBOW: 14,
      LEFT_WRIST: 15, RIGHT_WRIST: 16,
      LEFT_PINKY: 17, RIGHT_PINKY: 18,
      LEFT_INDEX: 19, RIGHT_INDEX: 20,
      LEFT_THUMB: 21, RIGHT_THUMB: 22,
      LEFT_HIP: 23, RIGHT_HIP: 24,
      LEFT_KNEE: 25, RIGHT_KNEE: 26,
      LEFT_ANKLE: 27, RIGHT_ANKLE: 28,
      LEFT_HEEL: 29, RIGHT_HEEL: 30,
      LEFT_FOOT_INDEX: 31, RIGHT_FOOT_INDEX: 32
    };

    const POSE_CONNECTIONS = [
      [11,12],[11,23],[12,24],[23,24],
      [11,13],[13,15],[15,17],[15,19],[15,21],
      [12,14],[14,16],[16,18],[16,20],[16,22],
      [23,25],[25,27],[27,29],[27,31],[29,31],
      [24,26],[26,28],[28,30],[28,32],[30,32]
    ];

    // ============================================================
    // Geometry utils
    // ============================================================
    function distance(a, b) {
      const dx = b.x - a.x, dy = b.y - a.y;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function threePointAngle(a, b, c) {
      const v1 = {x: a.x - b.x, y: a.y - b.y};
      const v2 = {x: c.x - b.x, y: c.y - b.y};
      const dot = v1.x*v2.x + v1.y*v2.y;
      const m1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
      const m2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
      if (!m1 || !m2) return 90;
      return Math.acos(Math.max(-1, Math.min(1, dot/(m1*m2)))) * 180 / Math.PI;
    }

    // ============================================================
    // Squat state machine
    // ============================================================
    const TARGET_COUNT = 5;
    const THRESHOLDS = {
      minDescent: 0.12,      // 开始下蹲检测阈值（降低）
      goodDescent: 0.18,     // 深蹲达标阈值（降低）
      maxSpeed: 0.02,        // 判断到达底部的速度阈值
      smoothingWindow: 5,    // 平滑窗口
      minHoldFrames: 3       // 在底部停留帧数
    };

    let internalState = 'STANDING';
    let bottomFrameCount = 0;
    let currentCount = 0;
    let completed = false;

    // ============================================================
    // DOM refs
    // ============================================================
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countNum = document.getElementById('countNum');
    const countLabel = document.getElementById('countLabel');
    const progressFill = document.getElementById('progressFill');
    const feedbackText = document.getElementById('feedbackText');
    const fpsBadge = document.getElementById('fpsBadge');
    const completeOverlay = document.getElementById('completeOverlay');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');

    let lastFrameTime = 0;
    let fpsHistory = [];

    // ============================================================
    // Canvas resize
    // ============================================================
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================
    // Show feedback helper
    // ============================================================
    let feedbackTimeout = null;
    function showFeedback(text, duration = 1200) {
      feedbackText.textContent = text;
      feedbackText.classList.add('show');
      if (feedbackTimeout) clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        feedbackText.classList.remove('show');
      }, duration);
    }

    function updateCountUI() {
      countNum.textContent = currentCount;
      countLabel.textContent = `${currentCount} / ${TARGET_COUNT}`;
      progressFill.style.height = `${(currentCount / TARGET_COUNT) * 100}%`;

      // Pop animation
      countNum.classList.add('pop');
      setTimeout(() => countNum.classList.remove('pop'), 150);
    }

    // ============================================================
    // Drawing helpers (same style as test-full-body.html)
    // ============================================================
    const w = () => canvas.width;
    const h = () => canvas.height;
    function mx(x) { return w() - x * w(); }
    function my(y) { return y * h(); }

    function getPt(lm, i, threshold) {
      const t = threshold || 0.3;
      return lm[i] && lm[i].visibility >= t ? lm[i] : null;
    }

    // ============================================================
    // Draw body (torso + arms + legs) - visible fills
    // ============================================================
    function drawBody(lm) {
      const ls = getPt(lm, 11), rs = getPt(lm, 12);
      const lh = getPt(lm, 23), rh = getPt(lm, 24);
      if (!ls || !rs) return;

      const sw = Math.abs(mx(rs.x) - mx(ls.x));

      // Torso (trapezoid)
      if (lh && rh) {
        ctx.beginPath();
        ctx.moveTo(mx(ls.x) - sw*0.15, my(ls.y));
        ctx.lineTo(mx(rs.x) + sw*0.15, my(rs.y));
        ctx.lineTo(mx(rh.x) + sw*0.10, my(rh.y));
        ctx.lineTo(mx(lh.x) - sw*0.10, my(lh.y));
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,255,136,0.25)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,136,0.6)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }

      // Arms
      function drawArm(si, ei, wi, dir) {
        const s = getPt(lm, si), e = getPt(lm, ei), wrist = getPt(lm, wi);
        if (!s || !e) return;
        const aw = sw*0.12, ww = aw*0.55;
        // Upper arm
        ctx.beginPath();
        ctx.moveTo(mx(s.x)-dir*aw, my(s.y));
        ctx.lineTo(mx(s.x)+dir*aw, my(s.y));
        ctx.lineTo(mx(e.x)+dir*aw*0.85, my(e.y));
        ctx.lineTo(mx(e.x)-dir*aw*0.85, my(e.y));
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,255,136,0.18)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,136,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Forearm
        if (wrist) {
          ctx.beginPath();
          ctx.moveTo(mx(e.x)-dir*aw*0.85, my(e.y));
          ctx.lineTo(mx(e.x)+dir*aw*0.85, my(e.y));
          ctx.lineTo(mx(wrist.x)+dir*ww, my(wrist.y));
          ctx.lineTo(mx(wrist.x)-dir*ww, my(wrist.y));
          ctx.closePath();
          ctx.fillStyle = 'rgba(0,255,136,0.18)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,255,136,0.5)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      drawArm(11, 13, 15, -1);
      drawArm(12, 14, 16,  1);

      // Legs
      function drawLeg(hi, ki, ai, dir) {
        const hp = getPt(lm, hi), kp = getPt(lm, ki), ap = getPt(lm, ai);
        if (!hp || !kp) return;
        const lw = sw*0.15, aw = lw*0.5;
        // Thigh
        ctx.beginPath();
        ctx.moveTo(mx(hp.x)-dir*lw, my(hp.y));
        ctx.lineTo(mx(hp.x)+dir*lw, my(hp.y));
        ctx.lineTo(mx(kp.x)+dir*lw*0.85, my(kp.y));
        ctx.lineTo(mx(kp.x)-dir*lw*0.85, my(kp.y));
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,255,136,0.18)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,136,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Shin
        if (ap) {
          ctx.beginPath();
          ctx.moveTo(mx(kp.x)-dir*lw*0.85, my(kp.y));
          ctx.lineTo(mx(kp.x)+dir*lw*0.85, my(kp.y));
          ctx.lineTo(mx(ap.x)+dir*aw, my(ap.y));
          ctx.lineTo(mx(ap.x)-dir*aw, my(ap.y));
          ctx.closePath();
          ctx.fillStyle = 'rgba(0,255,136,0.18)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,255,136,0.5)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      drawLeg(23, 25, 27, -1);
      drawLeg(24, 26, 28,  1);
    }

    // ============================================================
    // Draw head (face oval + features from Pose landmarks 0-10)
    // ============================================================
    function drawHead(lm) {
      const nose = getPt(lm, 0, 0.2);
      const leye = getPt(lm, 2, 0.2);
      const reye = getPt(lm, 5, 0.2);
      const lear = getPt(lm, 7, 0.2);
      const rear = getPt(lm, 8, 0.2);
      if (!nose || (!leye && !reye)) return;

      const noseX = mx(nose.x);
      const noseY = my(nose.y);

      // Head oval - width from ear or eye distance
      let faceW;
      if (lear && rear) {
        faceW = Math.abs(mx(rear.x) - mx(lear.x)) * 1.2;
      } else if (leye && reye) {
        faceW = Math.abs(mx(reye.x) - mx(leye.x)) * 2.6;
      } else {
        const eye = leye || reye;
        faceW = Math.abs(noseX - mx(eye.x)) * 3.5;
      }
      faceW = Math.max(faceW, 40);
      const headH = faceW * 1.2;

      // Draw face oval
      ctx.beginPath();
      ctx.ellipse(noseX, noseY - headH*0.1, faceW/2, headH/2, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,255,136,0.20)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,255,136,0.7)';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Eyes
      const fc = 'rgba(0,255,136,0.8)';
      const ff = 'rgba(0,255,136,0.35)';
      const eyeR = faceW * 0.12;

      if (leye) {
        const ex = mx(leye.x), ey = my(leye.y);
        ctx.beginPath();
        ctx.ellipse(ex, ey, eyeR, eyeR*0.6, 0, 0, Math.PI*2);
        ctx.fillStyle = ff;
        ctx.fill();
        ctx.strokeStyle = fc;
        ctx.lineWidth = 2;
        ctx.stroke();
        // Pupil
        ctx.beginPath();
        ctx.arc(ex, ey, eyeR*0.35, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,255,136,0.9)';
        ctx.fill();
      }
      if (reye) {
        const ex = mx(reye.x), ey = my(reye.y);
        ctx.beginPath();
        ctx.ellipse(ex, ey, eyeR, eyeR*0.6, 0, 0, Math.PI*2);
        ctx.fillStyle = ff;
        ctx.fill();
        ctx.strokeStyle = fc;
        ctx.lineWidth = 2;
        ctx.stroke();
        // Pupil
        ctx.beginPath();
        ctx.arc(ex, ey, eyeR*0.35, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,255,136,0.9)';
        ctx.fill();
      }

      // Nose (triangle)
      const ns = faceW * 0.1;
      ctx.beginPath();
      ctx.moveTo(noseX, noseY - ns*0.5);
      ctx.lineTo(noseX - ns, noseY + ns);
      ctx.lineTo(noseX + ns, noseY + ns);
      ctx.closePath();
      ctx.strokeStyle = fc;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Mouth (smile curve)
      const ml = getPt(lm, 9, 0.2), mr = getPt(lm, 10, 0.2);
      if (ml && mr) {
        const midX = (mx(ml.x) + mx(mr.x)) / 2;
        const midY = (my(ml.y) + my(mr.y)) / 2;
        const mw = Math.abs(mx(mr.x) - mx(ml.x));
        ctx.beginPath();
        ctx.moveTo(mx(ml.x), my(ml.y));
        ctx.quadraticCurveTo(midX, midY + mw*0.35, mx(mr.x), my(mr.y));
        ctx.strokeStyle = fc;
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }

      // Ears (small arcs)
      if (lear) {
        ctx.beginPath();
        ctx.arc(mx(lear.x), my(lear.y), faceW*0.06, -0.8, 0.8);
        ctx.strokeStyle = 'rgba(0,255,136,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      if (rear) {
        ctx.beginPath();
        ctx.arc(mx(rear.x), my(rear.y), faceW*0.06, Math.PI-0.8, Math.PI+0.8);
        ctx.strokeStyle = 'rgba(0,255,136,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // ============================================================
    // Draw skeleton lines (thin connections over filled shapes)
    // ============================================================
    function drawSkeletonLines(lm) {
      const V = 0.4;
      for (const [a, b] of POSE_CONNECTIONS) {
        const pa = lm[a], pb = lm[b];
        if (!pa || !pb) continue;
        if (pa.visibility < V || pb.visibility < V) continue;
        ctx.beginPath();
        ctx.moveTo(mx(pa.x), my(pa.y));
        ctx.lineTo(mx(pb.x), my(pb.y));
        ctx.strokeStyle = 'rgba(0,255,136,0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // ============================================================
    // Draw hands from Pose landmarks (15-22: wrists + fingertips)
    // ============================================================
    function drawHands(lm) {
      // Left hand: 15=wrist, 17=pinky, 19=index, 21=thumb
      // Right hand: 16=wrist, 18=pinky, 20=index, 22=thumb
      const V = 0.3;
      const color = 'rgba(77,166,255,0.7)';
      const dotColor = '#4da6ff';

      function drawOneHand(wi, pi, ii, ti) {
        const wrist = lm[wi], pinky = lm[pi], index = lm[ii], thumb = lm[ti];
        if (!wrist || wrist.visibility < V) return;
        const wx = mx(wrist.x), wy = my(wrist.y);

        // Draw wrist dot
        ctx.beginPath();
        ctx.arc(wx, wy, 4, 0, Math.PI*2);
        ctx.fillStyle = dotColor;
        ctx.fill();

        // Draw lines from wrist to each fingertip
        const tips = [pinky, index, thumb];
        for (const tip of tips) {
          if (!tip || tip.visibility < V) continue;
          const tx = mx(tip.x), ty = my(tip.y);
          ctx.beginPath();
          ctx.moveTo(wx, wy);
          ctx.lineTo(tx, ty);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();
          // Fingertip dot
          ctx.beginPath();
          ctx.arc(tx, ty, 3, 0, Math.PI*2);
          ctx.fillStyle = dotColor;
          ctx.fill();
        }
      }

      drawOneHand(15, 17, 19, 21); // Left
      drawOneHand(16, 18, 20, 22); // Right
    }

    // ============================================================
    // Debug: show landmark positions as colored dots
    // ============================================================
    function debugLandmarks(lm) {
      // Draw big dots at key positions to verify coordinate mapping
      const debugPts = [
        { idx: 0, color: '#ff0', label: 'nose' },
        { idx: 2, color: '#ff0', label: 'Leye' },
        { idx: 5, color: '#ff0', label: 'Reye' },
        { idx: 7, color: '#ff0', label: 'Lear' },
        { idx: 8, color: '#ff0', label: 'Rear' },
        { idx: 9, color: '#ff0', label: 'mouthL' },
        { idx: 10, color: '#ff0', label: 'mouthR' },
        { idx: 11, color: '#f00', label: 'Lshou' },
        { idx: 12, color: '#f00', label: 'Rshou' },
        { idx: 13, color: '#f80', label: 'Lelb' },
        { idx: 14, color: '#f80', label: 'Relb' },
        { idx: 15, color: '#f80', label: 'Lwri' },
        { idx: 16, color: '#f80', label: 'Rwri' },
        { idx: 23, color: '#0ff', label: 'Lhip' },
        { idx: 24, color: '#0ff', label: 'Rhip' },
      ];
      for (const dp of debugPts) {
        const p = lm[dp.idx];
        if (!p || p.visibility < 0.2) continue;
        const x = mx(p.x), y = my(p.y);
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI*2);
        ctx.fillStyle = dp.color;
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '10px monospace';
        ctx.fillText(dp.idx + ':' + dp.label + ' v' + p.visibility.toFixed(2), x + 8, y - 8);
      }
    }

    // ============================================================
    // Squat detection - uses knee angle for better accuracy
    // ============================================================
    function processSquat(landmarks) {
      const lHip = landmarks[POSE_LANDMARKS.LEFT_HIP];
      const rHip = landmarks[POSE_LANDMARKS.RIGHT_HIP];
      const lKnee = landmarks[POSE_LANDMARKS.LEFT_KNEE];
      const rKnee = landmarks[POSE_LANDMARKS.RIGHT_KNEE];
      const lAnkle = landmarks[POSE_LANDMARKS.LEFT_ANKLE];
      const rAnkle = landmarks[POSE_LANDMARKS.RIGHT_ANKLE];

      if (!lHip || !rHip || !lKnee || !rKnee || !lAnkle || !rAnkle) {
        return; // Skip if key points missing
      }
      if (lHip.visibility < 0.5 || rHip.visibility < 0.5 || 
          lKnee.visibility < 0.5 || rKnee.visibility < 0.5) {
        return;
      }

      // Calculate knee angles (smaller = more bent)
      const leftKneeAngle = threePointAngle(lHip, lKnee, lAnkle);
      const rightKneeAngle = threePointAngle(rHip, rKnee, rAnkle);
      const avgKneeAngle = (leftKneeAngle + rightKneeAngle) / 2;

      // Standing: knee angle ~ 170-180°
      // Squatting: knee angle ~ 70-100°
      const SQUAT_ANGLE = 110;  // Below this = squatting
      const STAND_ANGLE = 150;  // Above this = standing

      const t = THRESHOLDS;
      
      switch (internalState) {
        case 'STANDING':
          if (avgKneeAngle < SQUAT_ANGLE) {
            internalState = 'DESCENDING';
            showFeedback('继续下蹲...', 800);
          }
          break;

        case 'DESCENDING':
          if (avgKneeAngle < 90) { // Good squat depth
            internalState = 'BOTTOM';
            bottomFrameCount = 0;
            showFeedback('很好！起身', 600);
          } else if (avgKneeAngle > STAND_ANGLE) {
            internalState = 'STANDING'; // Gave up
          }
          break;

        case 'BOTTOM':
          bottomFrameCount++;
          if (bottomFrameCount >= t.minHoldFrames) {
            internalState = 'ASCENDING';
          }
          break;

        case 'ASCENDING':
          if (avgKneeAngle > STAND_ANGLE) {
            internalState = 'COUNTED';
            currentCount++;
            updateCountUI();

            if (currentCount >= TARGET_COUNT) {
              onComplete();
            } else {
              showFeedback(`第 ${currentCount} 个！💪`, 1500);
              setTimeout(() => {
                internalState = 'STANDING';
              }, 500);
            }
          }
          break;
      }

      // Debug: show angle
      fpsBadge.textContent = `${Math.round(avgKneeAngle)}°`;
    }

    // ============================================================
    // Completion
    // ============================================================
    async function onComplete() {
      completed = true;
      completeOverlay.classList.add('show');
      playSuccessSound();
      showFeedback('太棒了！🎉', 3000);

      // Notify main process via HTTP, then close
      setTimeout(async () => {
        try {
          await fetch('http://localhost:3721/api/scene-complete', {method: 'POST'});
        } catch (_) {}
        setTimeout(() => window.close(), 1500);
      }, 2000);
    }

    function playSuccessSound() {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ac.currentTime);
        osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.6);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start();
        osc.stop(ac.currentTime + 0.6);
      } catch(_) {}
    }

    // ============================================================
    // MediaPipe Pose + Hands
    // ============================================================
    let poseLandmarker = null;

    async function initMediaPipe() {
      loadingText.textContent = '正在加载动作检测模型...';

      try {
        const { FilesetResolver, PoseLandmarker } = await import(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js'
        );

        loadingText.textContent = '加载 Vision 模块...';

        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
        );

        loadingText.textContent = '创建 Pose 检测器...';

        poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: '/models/pose_landmarker_lite.task',
            delegate: 'CPU'
          },
          runningMode: 'VIDEO',
          numPoses: 1,
          minPoseDetectionConfidence: 0.5,
          minPosePresenceConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        loadingText.textContent = '启动摄像头...';
      } catch (e) {
        loadingText.textContent = '加载失败: ' + e.message;
        console.error('MediaPipe init error:', e);
      }
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 640 },
          height: { ideal: 480 },
          facingMode: 'user'
        }
      });
      video.srcObject = stream;
      await video.play();
    }

    function detectLoop() {
      if (!poseLandmarker || !video.videoWidth) {
        requestAnimationFrame(detectLoop);
        return;
      }

      const now = performance.now();

      // FPS
      if (lastFrameTime > 0) {
        const elapsed = now - lastFrameTime;
        if (fpsHistory.length > 10) fpsHistory.shift();
        fpsHistory.push(1000 / elapsed);
        const fps = Math.round(fpsHistory.reduce((a,b)=>a+b,0) / fpsHistory.length);
        fpsBadge.textContent = `${fps} FPS`;
      }
      lastFrameTime = now;

      if (!completed) {
        try {
          const results = poseLandmarker.detectForVideo(video, now);
          if (results.landmarks && results.landmarks.length > 0) {
            const landmarks = results.landmarks[0];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBody(landmarks);
            drawHead(landmarks);
            drawHands(landmarks);
            drawSkeletonLines(landmarks);
            debugLandmarks(landmarks);
            processSquat(landmarks);
          }
        } catch(e) {
          console.error('detectLoop error:', e);
        }
      }

      requestAnimationFrame(detectLoop);
    }

    // ============================================================
    // Bootstrap
    // ============================================================
    (async () => {
      try {
        await initMediaPipe();
        await startCamera();

        // Hide loading
        loadingOverlay.classList.add('hidden');
        setTimeout(() => loadingOverlay.remove(), 600);

        showFeedback('请站好，开始深蹲！', 2000);
        detectLoop();
      } catch (err) {
        loadingText.textContent = `启动失败: ${err.message}`;
        console.error(err);
      }
    })();
  </script>
